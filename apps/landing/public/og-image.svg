<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand mark + wordmark, top-left -->
  <g transform="translate(72,72)">
    <rect width="56" height="56" rx="12" fill="#4F46E5"/>
    <g transform="translate(11,11) scale(1.2)" fill="#FFFFFF">
      <path d="M2 22 C 6 20, 10 14, 14 12 L 22 4 L 26 8 L 18 16 C 16 20, 10 24, 4 26 Z"/>
    </g>
    <text x="76" y="38" font-family="'Source Serif 4', Georgia, serif" font-size="32" font-weight="500" fill="#0B1220" letter-spacing="-0.01em">Sealed</text>
  </g>

  <!-- Headline -->
  <text x="72" y="320" font-family="'Source Serif 4', Georgia, serif" font-size="92" font-weight="500" fill="#0B1220" letter-spacing="-0.02em">Put your</text>
  <text x="72" y="420" font-family="'Source Serif 4', Georgia, serif" font-style="italic" font-size="92" font-weight="500" fill="#0B1220" letter-spacing="-0.02em">name to it.</text>
  <path d="M76 442 C 200 422, 360 422, 480 432" stroke="#4F46E5" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Subhead -->
  <text x="72" y="500" font-family="'Inter', system-ui, sans-serif" font-size="28" fill="#374151">A quieter way to sign, send, and store documents.</text>

  <!-- Bottom-right URL -->
  <text x="1128" y="572" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="22" fill="#64748B" letter-spacing="0.04em">seald-landing.nromomentum.com</text>
</svg>
