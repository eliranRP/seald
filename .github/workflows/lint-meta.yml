name: Lint Meta

# Catches surface-level breakage that the regular CI doesn't:
#   - GH Actions workflow YAML (actionlint) — bad refs, expression syntax,
#     runner/shell errors, the column-0 Unicode bug from run 24935104725
#   - Cucumber .feature files (gherkin-lint) — tag taxonomy, indentation,
#     missing scenarios
#   - Cross-tree typos (cspell) — workflows + features + ts/tsx source
#
# All three jobs run in parallel; none depends on the others. The whole
# matrix completes well under 90s so the PR feedback loop stays snappy.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: lint-meta-${{ github.ref }}
  cancel-in-progress: true

# Lint-only workflow: read source, run actionlint / gherkin-lint /
# cspell. No GITHUB_TOKEN write surface required.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------
  # Path filter — lets each meta-lint job skip when its target file
  # type wasn't touched. Pushes to main bypass the filter so every
  # merged HEAD is fully linted regardless of the PR's path scope.
  # ---------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      gherkin: ${{ steps.filter.outputs.gherkin }}
      spelling: ${{ steps.filter.outputs.spelling }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            gherkin:
              - '**/*.feature'
              - '.gherkin-lintrc'
              - '.github/workflows/lint-meta.yml'
            spelling:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.md'
              - '**/*.feature'
              - '.github/workflows/**'
              - 'cspell.json'
              - '.cspell.json'
              - '.cspell/**'

  lint-workflows:
    name: actionlint (workflow YAML)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.workflows == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        # The Go binary is fast and self-contained — no Node setup needed.
        # actionlint auto-detects every .github/workflows/*.yml file.
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  lint-gherkin:
    name: gherkin-lint (.feature files)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.gherkin == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        # cspell@10 requires >=22.18.0; gherkin-lint is fine on 22 too,
        # so we use Node 22 LTS for both jobs.
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run gherkin-lint
        run: pnpm lint:gherkin

  lint-spelling:
    name: cspell (typo check)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.spelling == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        # cspell@10 requires Node >=22.18.0 — Node 20 is rejected with
        # "Unsupported NodeJS version".
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run cspell
        run: pnpm lint:spelling

  # Aggregator job: succeeds if every upstream lint job is success or
  # skipped. Branch protection points at this single job so a PR that
  # touches no .feature files (gherkin SKIPPED) or no workflow YAML
  # (actionlint SKIPPED) can still satisfy the required-status-checks
  # gate.
  lint-meta-success:
    name: Lint Meta Success
    runs-on: ubuntu-latest
    needs: [lint-workflows, lint-gherkin, lint-spelling]
    if: always()
    steps:
      - name: Verify all required lint jobs passed (or were skipped)
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Upstream results: $results"
          if [[ "$results" == *failure* ]]; then
            echo "::error::One or more upstream lint jobs failed"
            exit 1
          fi
          if [[ "$results" == *cancelled* ]]; then
            echo "::error::One or more upstream lint jobs were cancelled"
            exit 1
          fi
          echo "All upstream lint jobs succeeded or were skipped — gate passes."
