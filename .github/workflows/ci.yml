name: CI

on:
  pull_request:
    branches: [main]
    # Skip CI for changes that can't break the build/tests. Anything that
    # touches code, configs, lockfiles, or workflow YAML still triggers CI.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default GITHUB_TOKEN scope for every job in this workflow. CI only
# checks out source, runs tests/lint, and uploads artifacts via the
# artifact action (which uses its own scoped path, not GITHUB_TOKEN
# write). `contents: read` covers checkout + artifact download.
# Tightens to least-privilege per CodeQL `actions/missing-workflow-permissions`.
permissions:
  contents: read

# Silence the Sep 2026 Node 20 deprecation notice from GitHub by
# opting every step into Node 24 up-front. Harmless now, and skips the
# runtime bump when June 2 2026 flips the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------
  # Path-filter gate. PRs scope downstream jobs to the diffs that
  # actually exercise them (saves ~10–15 minutes of runner time on
  # docs/landing/deploy-only PRs). Pushes to main bypass the filter
  # entirely so the merged HEAD is always validated end-to-end.
  #
  # Each downstream job's `if:` clause unions the filter output with
  # `github.event_name == 'push'`, which guarantees post-merge runs
  # always proceed regardless of which paths changed. This preserves
  # the deploy + baseline contract documented in CLAUDE.md.
  #
  # We use job-level `if:` rather than workflow-level `paths:` filters
  # because workflow-level filters all-or-nothing the entire workflow,
  # and we want per-job granularity.
  # ---------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      storybook: ${{ steps.filter.outputs.storybook }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lint:
              - 'apps/**'
              - 'packages/**'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'apps/*/eslint.config.*'
              - 'apps/*/tsconfig*.json'
              - 'packages/*/tsconfig*.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/ci.yml'
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            storybook:
              - 'apps/web/**'
              - '.storybook/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------
  # Install once per SHA; every downstream job restores the cached
  # pnpm store. This is the slowest step (cold install ≈ 90s) so we
  # keep it in one place. Runs whenever any downstream job will run,
  # i.e. on every push and on PRs that match any filter.
  # ---------------------------------------------------------------
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.lint == 'true'
      || needs.changes.outputs.api == 'true'
      || needs.changes.outputs.web == 'true'
      || needs.changes.outputs.storybook == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

  # ---------------------------------------------------------------
  # Static quality gates — shared + api + web.
  # ---------------------------------------------------------------
  lint:
    name: Lint + typecheck + shared build
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: github.event_name == 'push' || needs.changes.outputs.lint == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Typecheck workspace
        run: pnpm -r typecheck

      - name: Lint workspace
        run: pnpm -r lint

  # ---------------------------------------------------------------
  # Dependency audit — fail the pipeline on any high-or-critical
  # advisory in production deps. Dev-only advisories don't block.
  # ---------------------------------------------------------------
  audit:
    name: pnpm audit (high+ severity)
    runs-on: ubuntu-latest
    needs: [changes, install]
    # Dependency advisories only change when the lockfile changes, so
    # PRs with no lockfile delta can skip this. Pushes still run it
    # every time so any new advisory landing on main is surfaced.
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.lint == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high

  # ---------------------------------------------------------------
  # Unit tests — fast, deterministic, no external deps.
  # ---------------------------------------------------------------
  unit:
    name: API unit tests
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: github.event_name == 'push' || needs.changes.outputs.api == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Unit tests
        # jest auto-detects CI=true from GHA; --runInBand is the default
        # when CI=true, so no extra flags needed. The previous `-- --ci
        # --runInBand` was being forwarded as test-name filters by pnpm.
        run: pnpm --filter api test

  # ---------------------------------------------------------------
  # Web unit tests — Vitest + RTL. Caught a regression in the
  # SigningEntryPage error-state mapping that the API jobs miss.
  # ---------------------------------------------------------------
  web:
    name: Web unit tests
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Web tests with coverage
        run: pnpm --filter web test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage-html
          path: apps/web/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v6
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          # The repo isn't enrolled in Codecov yet — leave the action in
          # place but flagged as non-blocking. When a `CODECOV_TOKEN` secret
          # is added, the upload will start propagating to codecov.io;
          # until then the step soft-fails (it's outside the test gate).
          fail_ci_if_error: false
        continue-on-error: true

  # ---------------------------------------------------------------
  # Storybook build — catches type errors in stories that the regular
  # typecheck/build miss because *.stories.tsx isn't in the main build
  # graph. A failed Storybook build should block merges.
  # ---------------------------------------------------------------
  storybook:
    name: Storybook build
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: github.event_name == 'push' || needs.changes.outputs.storybook == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Build Storybook
        run: pnpm --filter web build-storybook

      - name: Upload Storybook static
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/web/storybook-static/
          retention-days: 7

  # ---------------------------------------------------------------
  # Playwright (web) — real-PDF template + signing happy-path
  # regression gate. Drives the SPA dev server with intercepted
  # `/api/*` and `/sign/*` mocks and asserts the load-bearing
  # "create from PDF → place fields → sign → finish" flow doesn't
  # break before merge. Scoped to the single happy-path spec so the
  # job stays fast (≈1m on cold-cache); the BDD project is NOT run
  # here — it's covered separately by the existing `web` vitest job.
  # ---------------------------------------------------------------
  playwright-web:
    name: Playwright (web) — template + sign happy path
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run template + sign happy-path spec
        run: pnpm --filter web exec playwright test --project=chromium e2e/template-sign-flow.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------
  # E2E tests — includes the PAdES B-T (openssl-P12) and PAdES-B-T
  # (KMS-against-LocalStack) suites. Ubuntu runners ship openssl. The
  # LocalStack service container exercises the KmsPadesSigner path
  # so we have a real KMS round-trip in CI without needing AWS creds.
  # ---------------------------------------------------------------
  e2e:
    name: API e2e tests (incl. PAdES + PAdES-B-T)
    runs-on: ubuntu-latest
    needs: [changes, install]
    # PAdES sealing must keep firing on every PR that touches api/shared
    # — see CLAUDE.md S.4. Pushes always run.
    if: github.event_name == 'push' || needs.changes.outputs.api == 'true'
    timeout-minutes: 15
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: kms
          DEBUG: 0
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: E2E tests
        run: pnpm --filter api test:e2e

      - name: Upload sealed-PDF artifacts for review
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sealed-pdf-samples
          path: apps/api/test-output/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------
  # PAdES verifier (F-13) — downloads the sealed PDFs uploaded by
  # the e2e job and runs apps/api/scripts/verify-pades.ts against
  # them. Asserts wire-level PAdES conformance: ETSI.CAdES.detached
  # subFilter, signing-cert-v2 attribute, messageDigest matches
  # /ByteRange-covered bytes, and the embedded CMS signature
  # actually verifies under the embedded cert's public key. Soft
  # checks for B-T / B-LT only emit log lines.
  # ---------------------------------------------------------------
  pades-verify:
    name: PAdES verifier (F-13)
    runs-on: ubuntu-latest
    needs: [changes, e2e]
    # Mirrors the e2e gate so we don't try to download an artifact
    # that the (skipped) e2e job never produced.
    if: github.event_name == 'push' || needs.changes.outputs.api == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Download sealed-PDF samples from e2e job
        uses: actions/download-artifact@v8
        with:
          name: sealed-pdf-samples
          path: pdfs/

      - name: Verify PAdES conformance
        run: pnpm --filter api exec ts-node scripts/verify-pades.ts ../../pdfs

  # Aggregator job: succeeds if every upstream job is success or skipped.
  # Branch protection points at this single job (instead of 9 individual
  # jobs) so backend-only PRs whose web/playwright jobs are SKIPPED via
  # paths-ignore can still satisfy the required-status-checks gate.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [install, lint, audit, unit, web, storybook, playwright-web, e2e, pades-verify]
    if: always()
    steps:
      - name: Verify all required jobs passed (or were skipped)
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Upstream results: $results"
          if [[ "$results" == *failure* ]]; then
            echo "::error::One or more upstream jobs failed"
            exit 1
          fi
          if [[ "$results" == *cancelled* ]]; then
            echo "::error::One or more upstream jobs were cancelled"
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped — gate passes."
