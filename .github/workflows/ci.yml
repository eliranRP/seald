name: CI

on:
  pull_request:
    branches: [develop, main]
    # Skip CI for changes that can't break the build/tests. Anything that
    # touches code, configs, lockfiles, or workflow YAML still triggers CI.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Silence the Sep 2026 Node 20 deprecation notice from GitHub by
# opting every step into Node 24 up-front. Harmless now, and skips the
# runtime bump when June 2 2026 flips the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------
  # Install once per SHA; every downstream job restores the cached
  # pnpm store. This is the slowest step (cold install ≈ 90s) so we
  # keep it in one place.
  # ---------------------------------------------------------------
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

  # ---------------------------------------------------------------
  # Static quality gates — shared + api + web.
  # ---------------------------------------------------------------
  lint:
    name: Lint + typecheck + shared build
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Typecheck workspace
        run: pnpm -r typecheck

      - name: Lint workspace
        run: pnpm -r lint

  # ---------------------------------------------------------------
  # Unit tests — fast, deterministic, no external deps.
  # ---------------------------------------------------------------
  unit:
    name: API unit tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Unit tests
        # jest auto-detects CI=true from GHA; --runInBand is the default
        # when CI=true, so no extra flags needed. The previous `-- --ci
        # --runInBand` was being forwarded as test-name filters by pnpm.
        run: pnpm --filter api test

  # ---------------------------------------------------------------
  # Web unit tests — Vitest + RTL. Caught a regression in the
  # SigningEntryPage error-state mapping that the API jobs miss.
  # ---------------------------------------------------------------
  web:
    name: Web unit tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Web tests
        run: pnpm --filter web test

  # ---------------------------------------------------------------
  # E2E tests — includes the PAdES + PAdES-B-T suites that shell out
  # to openssl. Ubuntu runners ship openssl so the suite won't skip.
  # ---------------------------------------------------------------
  e2e:
    name: API e2e tests (incl. PAdES + PAdES-B-T)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: E2E tests
        run: pnpm --filter api test:e2e

      - name: Upload sealed-PDF artifacts for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sealed-pdf-samples
          path: apps/api/test-output/
          if-no-files-found: ignore
          retention-days: 7
