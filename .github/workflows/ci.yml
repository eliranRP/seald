name: CI

on:
  pull_request:
    branches: [develop, main]
    # Skip CI for changes that can't break the build/tests. Anything that
    # touches code, configs, lockfiles, or workflow YAML still triggers CI.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Silence the Sep 2026 Node 20 deprecation notice from GitHub by
# opting every step into Node 24 up-front. Harmless now, and skips the
# runtime bump when June 2 2026 flips the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------
  # Install once per SHA; every downstream job restores the cached
  # pnpm store + node_modules. Cold install ≈ 90s; warm restore ≈ 5s.
  # Cache key is keyed on the lockfile hash so any dep change busts it.
  # ---------------------------------------------------------------
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

  # ---------------------------------------------------------------
  # Static quality gates — shared + api + web.
  # ---------------------------------------------------------------
  lint:
    name: Lint + typecheck + shared build
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Typecheck workspace
        run: pnpm -r typecheck

      - name: Lint workspace
        run: pnpm -r lint

  # ---------------------------------------------------------------
  # Unit tests — fast, deterministic, no external deps.
  # ---------------------------------------------------------------
  unit:
    name: API unit tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Unit tests
        # jest auto-detects CI=true from GHA; --runInBand is the default
        # when CI=true, so no extra flags needed. The previous `-- --ci
        # --runInBand` was being forwarded as test-name filters by pnpm.
        run: pnpm --filter api test

  # ---------------------------------------------------------------
  # Web unit tests — Vitest + RTL. Caught a regression in the
  # SigningEntryPage error-state mapping that the API jobs miss.
  # ---------------------------------------------------------------
  web:
    name: Web unit tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Web tests with coverage
        run: pnpm --filter web test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-html
          path: apps/web/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          # The repo isn't enrolled in Codecov yet — leave the action in
          # place but flagged as non-blocking. When a `CODECOV_TOKEN` secret
          # is added, the upload will start propagating to codecov.io;
          # until then the step soft-fails (it's outside the test gate).
          fail_ci_if_error: false
        continue-on-error: true

  # ---------------------------------------------------------------
  # Storybook build — catches type errors in stories that the regular
  # typecheck/build miss because *.stories.tsx isn't in the main build
  # graph. A failed Storybook build should block merges.
  # ---------------------------------------------------------------
  storybook:
    name: Storybook build
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Build Storybook
        run: pnpm --filter web build-storybook

      - name: Upload Storybook static
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/web/storybook-static/
          retention-days: 7

  # ---------------------------------------------------------------
  # E2E tests — includes the PAdES + PAdES-B-T suites that shell out
  # to openssl. Ubuntu runners ship openssl so the suite won't skip.
  # ---------------------------------------------------------------
  e2e:
    name: API e2e tests (incl. PAdES + PAdES-B-T)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: E2E tests
        run: pnpm --filter api test:e2e

      - name: Upload sealed-PDF artifacts for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sealed-pdf-samples
          path: apps/api/test-output/
          if-no-files-found: ignore
          retention-days: 7
