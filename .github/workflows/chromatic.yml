name: Chromatic
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  chromatic:
    name: Chromatic visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full git history for TurboSnap (onlyChanged).
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Cache pnpm store + node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter shared build
      # Chromatic via direct CLI — mirrors the local invocation that
      # initialized the project. The chromaui/action@v11 wrapper kept
      # failing auth with `INTERNAL_SERVER_ERROR: No app with code '***'
      # found` despite the secret value being correct; bypassing the
      # wrapper resolves it.
      - name: Run Chromatic
        working-directory: apps/web
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Dummy values so the Storybook build's `supabaseClient.ts` and
          # `signApiClient.ts` don't throw at module load. Mirrors the
          # equivalent values supplied to vitest in vite.config.ts. None
          # of these reach a real network — Storybook stories don't make
          # auth/network calls, the env check is just module-load defensive.
          VITE_API_BASE_URL: 'http://localhost:3000'
          VITE_SUPABASE_URL: 'http://localhost:54321'
          VITE_SUPABASE_PUBLISHABLE_KEY: 'sb_publishable_test'
        run: |
          pnpm exec chromatic \
            --project-token="$CHROMATIC_PROJECT_TOKEN" \
            --build-script-name=build-storybook \
            --exit-zero-on-changes \
            --auto-accept-changes=main \
            --only-changed
