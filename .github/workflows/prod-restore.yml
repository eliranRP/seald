name: Prod restore (.env + KMS binding cert + redeploy)

# One-shot recovery for the case where Terraform replaced the EC2
# instance and wiped the operator-provisioned `/opt/seald/apps/api/.env`
# + `/opt/seald/secrets/`. This workflow:
#
#   1. Drops the merged prod `.env` from the `PROD_API_ENV` GH secret
#      onto the host (mode 0600).
#   2. Generates a fresh KMS binding cert (Self-signed by the
#      `alias/seald-pades-sealing-prod` key via kms:Sign through the
#      EC2 instance IAM role) by running a one-shot `node:20` container
#      that installs ts-node + @aws-sdk/client-kms + node-forge inline
#      and invokes `apps/api/scripts/generate-kms-binding-cert.ts`.
#      Output: `/opt/seald/secrets/seald-pades-prod.crt.pem`.
#   3. Brings the docker compose stack up (`docker compose up -d --build`).
#   4. Polls the API container's healthcheck for up to 90s.
#
# Idempotent: re-running rewrites the .env / regenerates the cert /
# rebuilds the image. Manual trigger only — never on push.

on:
  workflow_dispatch: {}

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH restore + redeploy
        uses: appleboy/ssh-action@v1.1.0
        env:
          PROD_API_ENV: ${{ secrets.PROD_API_ENV }}
          AWS_KMS_ACCESS_KEY_ID: ${{ secrets.AWS_KMS_ACCESS_KEY_ID }}
          AWS_KMS_SECRET_ACCESS_KEY: ${{ secrets.AWS_KMS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 8m
          envs: PROD_API_ENV,AWS_KMS_ACCESS_KEY_ID,AWS_KMS_SECRET_ACCESS_KEY
          script: |
            set -euo pipefail
            cd /opt/seald

            echo '=== Sync repo to origin/main ==='
            sudo git fetch --depth=1 origin main
            sudo git reset --hard origin/main
            sudo git log -1 --format='%h %ci %s'

            echo '=== Write apps/api/.env from PROD_API_ENV secret ==='
            sudo install -d -o $(id -u) -g $(id -g) /opt/seald/apps/api
            printf '%s' "$PROD_API_ENV" | sudo tee /opt/seald/apps/api/.env >/dev/null
            # Append AWS creds for the dedicated pades-signer IAM user.
            # The instance has no IAM role attached (ami_replace did not
            # rewire the instance profile — separate Terraform task), so
            # we hand the API container static keys via env_file. The
            # `seald-pades-signer-prod` user has *only* kms:Sign +
            # kms:GetPublicKey on alias/seald-pades-sealing-prod.
            {
              printf '\nAWS_ACCESS_KEY_ID=%s\n' "$AWS_KMS_ACCESS_KEY_ID"
              printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$AWS_KMS_SECRET_ACCESS_KEY"
              printf 'AWS_REGION=us-east-2\n'
            } | sudo tee -a /opt/seald/apps/api/.env >/dev/null
            sudo chmod 0600 /opt/seald/apps/api/.env
            sudo wc -c /opt/seald/apps/api/.env
            # Sanity-check critical keys are present (no values printed).
            for k in DATABASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY \
                     PDF_SIGNING_PROVIDER PDF_SIGNING_KMS_KEY_ID \
                     PDF_SIGNING_KMS_REGION PDF_SIGNING_KMS_CERT_PEM_PATH \
                     APP_PUBLIC_URL CORS_ORIGIN CADDY_DOMAIN WEB_DOMAIN; do
              if ! sudo grep -q "^$k=" /opt/seald/apps/api/.env; then
                echo "ERROR: missing required key $k in PROD_API_ENV" >&2
                exit 1
              fi
            done

            echo '=== Ensure /opt/seald/secrets dir exists ==='
            sudo install -d -m 0755 /opt/seald/secrets

            echo '=== Generate KMS binding cert via one-shot node container ==='
            # The container picks up the EC2 instance IAM role via IMDS;
            # the role has kms:Sign + kms:GetPublicKey on the sealing key
            # (granted by the `module.sealing_kms` Terraform module). We
            # install ts-node + the SDK + node-forge inline so we don't
            # depend on host-level node/pnpm.
            #
            # The inline script is written to a host file first, then
            # mounted into the container — this dodges the multiple
            # layers of quoting between drone-ssh, sudo, and `docker run
            # sh -ec '...'` that swallowed stderr on the previous run.
            sudo install -d -m 0755 /opt/seald/_restore
            sudo tee /opt/seald/_restore/gen-cert.sh >/dev/null <<'SCRIPT'
            #!/bin/sh
            set -ex
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates
            # Install dependencies in an empty workspace so npm resolves
            # against ONLY the deps we ask for — running this inside
            # /work/apps/api would inherit the API's package.json and
            # hit peer-dep conflicts (e.g. @signpdf/signer-p12 pinning
            # node-forge ^1.3.3, vs. our 1.3.1).
            mkdir -p /tmp/cert-gen
            cd /tmp/cert-gen
            echo '{"name":"cert-gen","version":"0.0.0","private":true}' > package.json
            # Local tsconfig — ts-node walks upward looking for one and
            # would otherwise pick up apps/api/tsconfig.json (which uses
            # module: NodeNext + a strict moduleResolution that breaks
            # this throwaway transpile). Pin a permissive one here.
            cat > tsconfig.json <<'TSCONFIG'
            {"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"resolveJsonModule":true,"skipLibCheck":true,"strict":false,"allowJs":true}}
            TSCONFIG
            npm install --no-audit --no-fund \
              ts-node@10.9.2 typescript@5.4.5 \
              @aws-sdk/client-kms@3.620.0 \
              node-forge@1.3.1 \
              @types/node-forge@1.3.11 \
              @types/node@20.12.7
            # Copy the TS script INTO the deps workspace so Node's
            # CommonJS resolver (which walks upward from the file's
            # directory) finds @aws-sdk/client-kms + node-forge in
            # /tmp/cert-gen/node_modules. Running it in place at
            # /work/apps/api/scripts/ resolves upward from there and
            # never sees our deps.
            cp /work/apps/api/scripts/generate-kms-binding-cert.ts /tmp/cert-gen/gen.ts
            ./node_modules/.bin/ts-node --transpile-only ./gen.ts \
              --key-id alias/seald-pades-sealing-prod \
              --region us-east-2 \
              --out /work/secrets/seald-pades-prod.crt.pem
            SCRIPT
            sudo chmod 0755 /opt/seald/_restore/gen-cert.sh

            echo "=== AWS key shape check (no values exposed) ==="
            echo "AKID prefix=${AWS_KMS_ACCESS_KEY_ID:0:4} len=${#AWS_KMS_ACCESS_KEY_ID}"
            echo "SECRET first2=${AWS_KMS_SECRET_ACCESS_KEY:0:2} last2=${AWS_KMS_SECRET_ACCESS_KEY: -2} len=${#AWS_KMS_SECRET_ACCESS_KEY}"

            # The instance has no IAM role attached (Terraform-replaced
            # AMI; instance_profile was never wired into aws_instance.api
            # — fix tracked separately). Pass static IAM-user keys via
            # -e instead. Same keys are written into apps/api/.env above
            # so the runtime API container can call kms:Sign at sealing
            # time.
            sudo docker run --rm \
              -v /opt/seald:/work \
              -w /work/apps/api \
              -e AWS_REGION=us-east-2 \
              -e AWS_DEFAULT_REGION=us-east-2 \
              -e AWS_ACCESS_KEY_ID="$AWS_KMS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_KMS_SECRET_ACCESS_KEY" \
              node:20-bookworm-slim \
              /work/_restore/gen-cert.sh 2>&1
            sudo chmod 0644 /opt/seald/secrets/seald-pades-prod.crt.pem
            sudo head -1 /opt/seald/secrets/seald-pades-prod.crt.pem
            sudo openssl x509 -in /opt/seald/secrets/seald-pades-prod.crt.pem \
              -noout -subject -issuer -dates 2>&1 || true

            echo '=== docker compose up -d --build ==='
            sudo docker compose pull caddy 2>&1 || true
            sudo docker compose up -d --build

            echo '=== Wait for API healthcheck (max 90s) ==='
            for i in $(seq 1 30); do
              status=$(sudo docker inspect -f '{{.State.Health.Status}}' \
                $(sudo docker compose ps -q api) 2>/dev/null || echo unknown)
              echo "  [$i/30] api health=$status"
              if [ "$status" = "healthy" ]; then
                echo 'API healthy.'
                break
              fi
              sleep 3
            done

            echo '=== Final compose ps ==='
            sudo docker compose ps -a

            echo '=== /health from inside the host (loopback through Caddy) ==='
            curl -fsS -o /dev/null -w 'HTTP %{http_code}  total=%{time_total}s\n' \
              --max-time 5 http://localhost:3000/health || true
