name: Deploy Landing (Astro → Cloudflare Pages)

# Push-to-main deploy. Scoped to apps/landing/** + this workflow file so
# the rest of the monorepo doesn't trigger a marketing-site rebuild.
on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build + deploy'
        required: true
        default: 'main'

# Cancel an in-flight deploy when a newer commit lands. Marketing sites
# only need the latest build live.
concurrency:
  group: landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Astro build + Cloudflare Pages deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out the requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install pnpm
        # Defer to the `packageManager` field in package.json so we stay
        # in lockstep with the rest of the monorepo (currently 9.12.0).
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build the Astro landing page
        run: pnpm --filter landing build

      # cloudflare/wrangler-action@v3 will create the Pages project on
      # first run if it doesn't exist (uses the API token's permissions).
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist --project-name=seald-landing --branch=main --commit-dirty=true

      - name: Smoke test the deployed site
        run: |
          set -euo pipefail
          DOMAIN="seald-landing.nromomentum.com"
          # First deploy may not have the custom domain attached yet, so
          # fall back to the *.pages.dev URL when DNS isn't live.
          PAGES_URL="https://seald-landing.pages.dev"

          for url in "https://${DOMAIN}/" "${PAGES_URL}/"; do
            echo "Probing ${url}"
            for i in $(seq 1 15); do
              code=$(curl -sS -o /tmp/body -w '%{http_code}' "${url}" || true)
              if [ "$code" = "200" ] && grep -qi 'sealed' /tmp/body; then
                echo "OK — ${url} served the landing page (200, contains 'Sealed')"
                exit 0
              fi
              echo "  try ${i}: code=${code}"
              sleep 2
            done
          done
          echo "Smoke test failed — last body:" >&2
          head -c 1500 /tmp/body >&2 || true
          # Don't fail the deploy on smoke-test miss — DNS may still be
          # propagating on first run. Surface a warning instead.
          echo "::warning::Landing page smoke test did not return 200 yet"
