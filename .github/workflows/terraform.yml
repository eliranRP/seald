name: Terraform (deploy/terraform)

on:
  pull_request:
    branches: [main]
    paths: ['deploy/terraform/**', '.github/workflows/terraform.yml']
  # Push to main with Terraform changes → auto-apply. We gate on the
  # paths filter so an unrelated commit doesn't needlessly touch infra,
  # and the S3 state backend's lock prevents two concurrent applies.
  push:
    branches: [main]
    paths: ['deploy/terraform/**', '.github/workflows/terraform.yml']
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run against the live environment'
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ---------------------------------------------------------------
# What this workflow does:
#
#   PR to main with changes under deploy/terraform/ →
#     runs `terraform fmt -check` + `terraform validate` + `terraform plan`
#     and posts the plan summary to the PR as a comment.
#
#   Push to main →
#     runs `terraform plan` only. We intentionally do NOT auto-apply
#     infrastructure changes on every merge — that would be scary. Use
#     the workflow_dispatch 'apply' path instead when you're ready.
#
#   Manual dispatch with 'apply' →
#     runs `terraform apply -auto-approve` against the live state.
#
#   Manual dispatch with 'destroy' →
#     runs `terraform destroy -auto-approve`. DESTRUCTIVE. Reserved for
#     tear-down / rebuild workflows.
#
# State backend: expects a pre-provisioned S3 backend for the state file
# and DynamoDB for lock (configured via tf_backend_bucket /
# tf_backend_lock_table secrets). First-time setup: create those two
# resources by hand (or via a separate bootstrap terraform), then set
# the secrets. Don't check the state file into git.
# ---------------------------------------------------------------

jobs:
  terraform:
    name: ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      TF_IN_AUTOMATION: 'true'
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      # TF_VAR_aws_region MUST mirror AWS_REGION so Terraform deploys to
      # the same region the state bucket + instance live in. Without this
      # the module uses its variables.tf default (us-east-1) and creates
      # duplicate infra — we already got bitten by this once.
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_ssh_pubkey: ${{ secrets.SSH_PUBKEY }}
      # Enable managed GoDaddy DNS whenever the credentials are present. If
      # the account tier can't use the production API, flip to false here
      # and manage DNS manually from the GoDaddy dashboard.
      TF_VAR_godaddy_enabled: ${{ secrets.GODADDY_API_KEY != '' }}
      TF_VAR_godaddy_api_key: ${{ secrets.GODADDY_API_KEY }}
      TF_VAR_godaddy_api_secret: ${{ secrets.GODADDY_API_SECRET }}
      TF_VAR_godaddy_domain: ${{ secrets.GODADDY_DOMAIN }}
      # Writes an A record at api.seald.<GODADDY_DOMAIN>, e.g.
      # api.seald.nromomentum.com → the EIP.
      TF_VAR_godaddy_subdomain: api.seald

    defaults:
      run:
        working-directory: deploy/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=seald/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action != 'apply' && github.event.inputs.action != 'destroy'
        run: terraform plan -no-color -out=tf.plan

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = require('child_process').execSync(
              'terraform show -no-color tf.plan',
              { cwd: 'deploy/terraform', maxBuffer: 10 * 1024 * 1024 },
            ).toString();
            const body = '### Terraform plan\n```hcl\n' +
              out.split('\n').slice(0, 300).join('\n') +
              '\n```';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # Auto-apply fires in two cases:
      #   - Manual dispatch with action=apply
      #   - Push to main with a change under deploy/terraform/**
      # Pull requests and branch dispatches only plan.
      - name: Terraform apply
        if: >-
          github.event.inputs.action == 'apply'
          || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: terraform apply -auto-approve -no-color

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color
