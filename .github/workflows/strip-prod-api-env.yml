name: Strip tier-2 keys from PROD_API_ENV (one-shot)

# One-shot operator workflow. Reads `PROD_API_ENV`, removes the
# documented tier-2 (sensitive) keys + any leftover AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY / AWS_REGION lines (now sourced from IMDS +
# Secrets Manager), and writes the filtered value back to the
# `PROD_API_ENV` GH secret.
#
# Why a workflow: GH secrets are write-only via API; the only way to
# mutate one is to read it inside CI and write it back. Uses a temp
# `GH_ADMIN_PAT` repo secret (provisioned + revoked by the operator)
# because the default GITHUB_TOKEN lacks `secrets:write` scope.
#
# Idempotent: re-running on an already-stripped PROD_API_ENV produces
# an unchanged value and a no-op secret update.
#
# DELETE THIS WORKFLOW AFTER A SUCCESSFUL RUN — it is single-purpose.

on:
  workflow_dispatch: {}

jobs:
  strip:
    name: Filter PROD_API_ENV and write back
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Filter and update secret
        env:
          PROD_API_ENV: ${{ secrets.PROD_API_ENV }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: GH_ADMIN_PAT secret missing. Provision it first via 'gh auth token | gh secret set GH_ADMIN_PAT'." >&2
            exit 1
          fi

          # Keys to drop from PROD_API_ENV. Tier-2 (now in Secrets
          # Manager) + the static AWS keys (now via IMDS) + AWS_REGION
          # (workflow re-adds it during prod-restore).
          DROP=(
            DATABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_ANON_KEY
            JWT_SECRET
            SIGNER_SESSION_SECRET
            CRON_SECRET
            METRICS_SECRET
            RESEND_API_KEY
            SMTP_PASS
            PDF_SIGNING_LOCAL_P12_PASS
            PDF_SIGNING_SSLCOM_CLIENT_SECRET
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
          )

          umask 0177
          tmpin=$(mktemp)
          tmpout=$(mktemp)
          trap 'rm -f "$tmpin" "$tmpout"' EXIT
          printf '%s' "$PROD_API_ENV" > "$tmpin"

          # Build a regex that matches "^(KEY1|KEY2|...)=" — drop any
          # line whose first '=' precedes one of the listed keys.
          regex='^('
          for k in "${DROP[@]}"; do regex="${regex}${k}|"; done
          regex="${regex%|})="

          # Filter line-by-line. Lines we keep are written verbatim to
          # tmpout; dropped lines are counted and the keys reported (no
          # values).
          dropped=()
          kept=0
          while IFS= read -r line || [ -n "$line" ]; do
            if printf '%s' "$line" | grep -qE "$regex"; then
              key="${line%%=*}"
              dropped+=("$key")
            else
              printf '%s\n' "$line" >> "$tmpout"
              kept=$((kept + 1))
            fi
          done < "$tmpin"

          # Strip a trailing blank line we may have introduced.
          # (`printf '%s\n'` always appends, so multiple consecutive
          # newlines from the source survive — that's fine, just
          # tidy the very end.)
          # shellcheck disable=SC2016  # awk script intentional
          awk 'NF || p; { p = $0 }' "$tmpout" > "${tmpout}.trim" || cp "$tmpout" "${tmpout}.trim"

          old_size=$(wc -c < "$tmpin")
          new_size=$(wc -c < "${tmpout}.trim")
          echo "PROD_API_ENV: ${old_size} -> ${new_size} bytes (kept ${kept} non-dropped lines)."
          if [ ${#dropped[@]} -eq 0 ]; then
            echo "Nothing to drop — PROD_API_ENV is already clean. No-op."
            exit 0
          fi
          echo "Dropped keys (${#dropped[@]}):"
          printf '  - %s\n' "${dropped[@]}"

          # Push the new value back. `gh secret set` reads from stdin
          # when `--body -` is given. Auth uses the GH_TOKEN env var.
          gh secret set PROD_API_ENV --repo "${GITHUB_REPOSITORY}" --body - < "${tmpout}.trim"

          echo "Done. PROD_API_ENV updated."
