name: Playwright

# Browser e2e tests for apps/web. Lives in its own workflow so it can iterate
# without colliding with the main CI matrix in ci.yml. The signing flow is
# the most user-facing happy path in the product and previously had ZERO
# browser coverage — vitest unit tests run in jsdom and miss real-browser
# regressions (CSS-in-JS hydration, react-router lazy boundaries, etc.).

on:
  pull_request:
    branches: [main]
    # Browser e2e exercises the SPA. Scope PR runs to web/shared
    # changes; main pushes keep the broader paths-ignore so every
    # merged HEAD is exercised in a real browser.
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/playwright.yml'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

# Browser e2e — read-only: checkout source, install browsers, run
# tests, upload report artifacts. No GITHUB_TOKEN write needed.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e-web:
    name: Web e2e (Playwright + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Install Chromium for Playwright
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter web e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------
  # BDD-driven Playwright suite (playwright-bdd). PRs run the @smoke
  # subset for fast feedback; main pushes run the full suite. See
  # apps/web/e2e/features/*.feature for the scenario inventory and
  # ~/.claude/skills/web-bdd-implementation/SKILL.md for the playbook.
  # ---------------------------------------------------------------
  bdd-e2e:
    name: BDD e2e (web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Cache pnpm store + node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter shared build
      - name: Install Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run BDD smoke (PR)
        # Dedicated scripts (bdd:smoke / bdd:full) avoid `pnpm … -- --grep`
        # which passes `--` to playwright as a literal file pattern,
        # producing "No tests found".
        if: github.event_name == 'pull_request'
        run: pnpm --filter web bdd:smoke

      - name: Run BDD full suite (push to main)
        if: github.event_name != 'pull_request'
        run: pnpm --filter web bdd:full

      - name: Upload BDD Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bdd-playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
