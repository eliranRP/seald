name: Playwright

# Browser e2e tests for apps/web. Lives in its own workflow so it can iterate
# without colliding with the main CI matrix in ci.yml. The signing flow is
# the most user-facing happy path in the product and previously had ZERO
# browser coverage — vitest unit tests run in jsdom and miss real-browser
# regressions (CSS-in-JS hydration, react-router lazy boundaries, etc.).

on:
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'Design-Guide/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e-web:
    name: Web e2e (Playwright + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Install Chromium for Playwright
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter web e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
