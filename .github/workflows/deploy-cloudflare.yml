name: Deploy (Cloudflare Pages — landing + SPA merged)

# Builds the marketing landing page (Astro) AND the React SPA, then
# merges them into a single Cloudflare Pages deployment so they share
# the canonical `seald.nromomentum.com` domain. The landing page owns
# the `/` index; every SPA route (signin, signup, /sign, /verify, /document,
# /documents, etc.) is rewritten to `/app.html` via Cloudflare's
# `_redirects` file. The SPA's own `index.html` is renamed to `app.html`
# during the merge so it doesn't clobber the landing's index.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build + deploy'
        required: true
        default: 'main'

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build_and_deploy:
    name: Build (landing + SPA) + Cloudflare Pages deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Build SPA
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm --filter web build

      - name: Build landing
        run: pnpm --filter landing build

      - name: Merge SPA into landing dist
        # The landing's index.html owns `/`. The SPA's index.html is
        # renamed to `app.html` during merge; a Pages `_worker.js`
        # rewrites every SPA route to that file server-side so the URL
        # bar stays on `/signin`, `/sign/<id>`, etc.
        #
        # Why a worker and not `_redirects` 200 rewrites:
        # CF Pages docs explicitly state that 200-status rewrites in
        # `_redirects` are NOT supported — they get coerced to 308
        # redirects. We tested this: `/signin /app.html 200` produced
        # a 308 to `/app` (CF also strips `.html` from served paths),
        # which broke the email CTA flow because the SPA loaded at
        # `/app` instead of `/sign/<id>` and routed to the dashboard.
        # A `_worker.js` is the supported escape hatch.
        run: |
          set -euo pipefail
          DEST=apps/landing/dist
          SPA=apps/web/dist

          test -s "$SPA/index.html" || { echo "no SPA index.html in $SPA"; exit 1; }
          test -s "$DEST/index.html" || { echo "no landing index.html in $DEST"; exit 1; }

          # Copy every SPA file into the landing dist EXCEPT its index.html
          # (which would otherwise overwrite the landing's `/` page).
          rsync -a --exclude='index.html' "$SPA/" "$DEST/"

          # Drop the SPA's HTML shell as `app.html`. The worker fetches
          # this file via the ASSETS binding for any SPA route.
          cp "$SPA/index.html" "$DEST/app.html"

          # Copy the Pages worker (server-side SPA rewriter). See
          # apps/landing/_worker.js for the implementation.
          cp apps/landing/_worker.js "$DEST/_worker.js"

          echo "----- merged dist -----"
          ls -la "$DEST/"
          echo "----- _worker.js -----"
          cat "$DEST/_worker.js"

      - name: Ensure Cloudflare Pages project exists
        # Idempotent. Wrangler pages deploy fails 7003 if the project
        # is missing; this step GETs and POSTs only on missing.
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PROJECT="seald-landing"
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects"

          status=$(curl -sS -o /tmp/cf-project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "${API}/${PROJECT}")

          missing=0
          if [ "${status}" = "200" ]; then
            echo "✓ Project ${PROJECT} already exists"
          elif [ "${status}" = "404" ]; then
            missing=1
          elif [ "${status}" = "400" ] && jq -e '.errors[]? | select(.code == 7003)' /tmp/cf-project.json >/dev/null; then
            # CF returns 400/7003 for non-existent Pages projects.
            missing=1
          else
            echo "✗ Unexpected status ${status} from CF API:"
            cat /tmp/cf-project.json
            exit 1
          fi

          if [ "${missing}" = "1" ]; then
            echo "→ Creating project ${PROJECT}"
            create_status=$(curl -sS -o /tmp/cf-create.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}" \
              -d "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\"}")
            echo "POST status: ${create_status}"
            cat /tmp/cf-create.json
            echo
            if ! jq -e '.success == true' /tmp/cf-create.json >/dev/null; then
              echo "----------------------------------------------------------"
              echo "  Cloudflare Pages project auto-create FAILED."
              echo ""
              echo "  CLOUDFLARE_API_TOKEN lacks Account > Cloudflare Pages > Edit"
              echo "  scope. CF returns 400/7003 for both GET-by-name AND"
              echo "  POST-create when the token can only deploy."
              echo ""
              echo "  One-time fix (30 seconds, then fully automated):"
              echo "    1. Open https://dash.cloudflare.com/?to=/:account/pages"
              echo "    2. Create a project > Direct upload"
              echo "    3. Project name: seald-landing"
              echo "    4. Production branch: main"
              echo ""
              echo "  Or, regenerate the token via the Edit Cloudflare Workers"
              echo "  template, then: gh secret set CLOUDFLARE_API_TOKEN ..."
              echo "----------------------------------------------------------"
              exit 1
            fi
            jq -r '.result.name' /tmp/cf-create.json
          fi

      - name: Deploy to Cloudflare Pages
        # The official cloudflare/wrangler-action@v3 fails in this pnpm
        # monorepo: with packageManager=pnpm it errors ERR_PNPM_ADDING_TO_ROOT,
        # and with packageManager=npm its internal `npm i wrangler@<ver>`
        # crashes with "Cannot read properties of null (reading 'matches')"
        # because npm chokes on the pnpm-managed root. We invoke wrangler
        # directly via `pnpm dlx`, which sidesteps both installers.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@3.90.0 pages deploy apps/landing/dist \
            --project-name=seald-landing \
            --branch=main

      - name: Attach custom domain to Cloudflare Pages project
        # Idempotent. Lists existing domains, no-ops when already
        # attached. New attaches put the domain into `initializing`
        # until CF sees the matching CNAME that the terraform workflow
        # provisioned (godaddy.tf → seald.nromomentum.com CNAME →
        # seald-landing.pages.dev).
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DOMAIN="seald.nromomentum.com"
          PROJECT="seald-landing"
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}/domains"

          existing=$(curl -fsS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}" | jq -r --arg d "${DOMAIN}" \
              '.result[]? | select(.name == $d) | .name')

          if [ "${existing}" = "${DOMAIN}" ]; then
            echo "✓ ${DOMAIN} already attached to ${PROJECT}"
          else
            echo "→ Attaching ${DOMAIN} to ${PROJECT}"
            curl -fsS -X POST \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}" \
              -d "{\"name\":\"${DOMAIN}\"}" | jq -r '.result.name // .errors'
          fi
