name: Deploy (SSH pull + compose up)

on:
  # Direct push-to-main deploy. The host rebuilds from source via
  # `docker compose up -d --build`, so we don't need to wait for the
  # GHCR image workflow. (workflow_run chaining is notoriously flaky
  # and silently drops events when the listener workflow has just
  # landed on the default branch; the direct push trigger is 100%
  # reliable.)
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'deploy/terraform/**'
      - '.github/workflows/terraform.yml'
      # The web SPA has its own deploy workflow (deploy-web.yml). Pure
      # frontend changes shouldn't trigger an API container rebuild.
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to check out on the host'
        required: true
        default: 'main'

concurrency:
  group: deploy
  cancel-in-progress: false

# Deploy is SSH-only — uses DEPLOY_SSH_KEY, never the GITHUB_TOKEN.
# Only `contents: read` is needed for the initial checkout step.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ---------------------------------------------------------------
# SSH-based deploy. The workflow:
#   1. Opens an SSH session to the EC2 host using DEPLOY_SSH_KEY.
#   2. cds into /opt/seald, fetches + checks out the requested ref.
#   3. Runs `docker compose pull && docker compose up -d` so the host
#      picks up the new GHCR image (or rebuilds locally if the host is
#      building from source). Migrations run automatically via the
#      entrypoint.
#   4. Polls /health until it returns 200 or times out.
#
# Only triggered manually OR after the Docker workflow succeeds on main,
# so nothing deploys to prod from a pending PR.
# ---------------------------------------------------------------

jobs:
  ssh_deploy:
    name: Pull + compose up on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -euo pipefail
            cd /opt/seald

            # Self-heal: prior break-glass workflows
            # (`prod-restore.yml`, `set-app-public-url.yml`) write files
            # under /opt/seald via `sudo` — leaving root-owned objects
            # in `.git/objects/`, root-owned `.env.bak.<ts>` snapshots
            # in `apps/api/`, and even root-owned tracked files when
            # they did sudo edits. Any of those breaks the SSH user's
            # subsequent `git fetch / stash / reset / clean`.
            #
            # Reclaim ownership for the SSH user across the WHOLE
            # checkout (not just .git) before any git op. Idempotent.
            # /opt/seald is small enough (~repo size) that the recursive
            # chown is a no-op-fast path on warm runs.
            sudo chown -R "$(id -u):$(id -g)" .

            # For workflow_run (push to main), inputs.ref is unset →
            # fall through to 'main'. For dispatch, honour the provided
            # ref input.
            REF="${{ inputs.ref || 'main' }}"
            echo "Deploying ref=$REF"

            git fetch --all --tags --prune

            # Self-heal: any local edits or untracked files block
            # `git pull --ff-only`. The previous version of this script
            # used `git pull --ff-only || true`, which silently ignored
            # the failure — leaving the host frozen ~70 commits behind
            # main while every `docker compose up -d --build` rebuilt
            # the same stale image. Discovered 2026-05-07 chasing a
            # localhost-in-audit-PDF bug that turned out to be 65+
            # un-deployed commits.
            #
            # Stash anything dirty (preserves it under refs/stash if
            # an operator is mid-fixup), then hard-reset to origin/$REF
            # and clean any untracked leftovers. After this, the
            # working tree is exactly $REF.
            echo "=== git status before reset ==="
            git status --porcelain | head -20 || true
            git stash push --include-untracked -m "auto-stash-pre-deploy-$(date +%Y%m%d-%H%M%S)" 2>&1 | head -3 || true
            git checkout "$REF"
            git reset --hard "origin/$REF"
            git clean -fd
            echo "deployed SHA: $(git rev-parse HEAD)"

            sudo docker compose pull || true
            sudo docker compose up -d --build --force-recreate api

            # Health probe: api:3000 is exposed only on the docker
            # network. Probe via the caddy container so we exercise
            # the real reverse-proxy path too.
            for i in $(seq 1 30); do
              if sudo docker exec seald-caddy-1 wget -qO- http://api:3000/health | grep -q '"status":"ok"'; then
                echo "/health OK after ${i} tries"
                exit 0
              fi
              sleep 2
            done
            echo "/health never came up" >&2
            sudo docker compose logs --tail=200 api
            exit 1
