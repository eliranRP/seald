<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sealed — Signing App</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../../favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../../apple-touch-icon.png">
  <link rel="manifest" href="../../site.webmanifest">
  <meta name="theme-color" content="#4F46E5">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html,body{margin:0;padding:0;background:var(--ink-50);}
    #root{font-family:var(--font-sans);color:var(--fg-2);}
    .stepper{position:fixed;bottom:20px;left:20px;z-index:50;display:flex;gap:6;background:#fff;border:1px solid var(--border-1);border-radius:999px;padding:4px;box-shadow:var(--shadow-md);font-family:var(--font-sans);}
    .stepper button{border:none;background:transparent;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--fg-3);cursor:pointer;}
    .stepper button.on{background:var(--ink-900);color:#fff}
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../_shared/components.jsx"></script>
  <script type="text/babel" src="./Screens.jsx"></script>
  <script type="text/babel" src="./Auth.jsx"></script>
  <script type="text/babel" src="./RecipientFlow.jsx"></script>
  <script type="text/babel" src="./SendingScreen.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const AUTH_PAGES = ['signin','signup','forgot','check-email'];
    const GUEST_ALLOWED = ['place','sign','sent']; // guest can only touch the sign-a-pdf flow
    const RECIPIENT_PAGES = ['r-email','r-prep','r-fill','r-review','r-done'];
    function App(){
      const [page, setPage] = useState(() => {
        // Land on the new sending-loader screen on first open
        const saved = localStorage.getItem('sealed.page');
        if (!saved || saved === 'signin' || saved === 'r-email') return 'sending';
        return saved;
      });
      const [guest, setGuest] = useState(() => localStorage.getItem('sealed.guest') === '1');
      const [contacts, setContacts] = useContacts();
      const [guestContacts, setGuestContacts] = useState(() => {
        try { const s = localStorage.getItem('sealed.guestContacts'); if (s) return JSON.parse(s); } catch(e){}
        return [];
      });
      useEffect(()=>{ localStorage.setItem('sealed.guestContacts', JSON.stringify(guestContacts)); }, [guestContacts]);
      useEffect(()=>{ localStorage.setItem('sealed.page', page); },[page]);
      useEffect(()=>{ localStorage.setItem('sealed.guest', guest ? '1' : '0'); },[guest]);
      useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

      const isAuth = AUTH_PAGES.includes(page);
      const isRecipient = RECIPIENT_PAGES.includes(page);

      // Guest guard: if guest somehow lands on a non-allowed screen, bounce to place
      useEffect(()=>{
        if (guest && !isAuth && !GUEST_ALLOWED.includes(page)) setPage('place');
      }, [guest, page, isAuth]);

      const goAuth = (m) => { setGuest(false); setPage(m); };
      const skipAuth = () => { setGuest(true); setPage('place'); };

      return (
        <div data-screen-label={`Signing App — ${guest?'guest · ':''}${page}`}>
          {isRecipient ? (
            <RecipientFlow
              stage={page.replace('r-','')}
              onStage={(s)=>setPage('r-'+s)}
              onExit={()=>setPage(guest?'place':'upload')}
            />
          ) : isAuth ? (
            <AuthScreen mode={page} onMode={(m)=>setPage(m)} onAuthed={()=>{ setGuest(false); setPage('upload'); }} onSkip={skipAuth}/>
          ) : page==='contacts' ? (
            <>
              <TopNav active="contacts" onLogo={()=>setPage('upload')} onNav={(k)=>{ if(k==='contacts') setPage('contacts'); else setPage('place'); }}/>
              <ContactsScreen contacts={contacts} setContacts={setContacts}/>
            </>
          ) : (
            <>
              <TopNav
                active="documents"
                onLogo={()=>setPage(guest?'place':'upload')}
                onNav={(k)=>{ if(guest) return; if(k==='contacts') setPage('contacts'); else setPage('place'); }}
                guest={guest}
                onSignIn={()=>goAuth('signin')}
                onSignUp={()=>goAuth('signup')}
              />
              <div style={{display:'flex'}}>
                {!guest && page !== 'place' && <LeftRail active={page==='upload'?'drafts':'sent'}/>}
                <div style={{flex:1, minWidth:0}}>
                  {page==='upload' && <UploadScreen onNext={()=>setPage('place')}/>}
                  {page==='place' && <PlaceFieldsScreen contacts={guest?guestContacts:contacts} setContacts={guest?setGuestContacts:setContacts} onNext={()=>setPage('sending')} onBack={()=>guest?skipAuth():setPage('upload')} guest={guest}/>}
                  {page==='sending' && <SendingScreen signers={(guest?guestContacts:contacts).slice(0,3)} fieldCount={3} onDone={()=>setPage('sent')} onCancel={()=>setPage('place')}/>}
                  {page==='sign' && <SignScreen onDone={()=>setPage('sent')} onBack={()=>setPage('place')}/>}
                  {page==='sent' && <SentScreen onReset={()=>setPage(guest?'place':'upload')} guest={guest} onSignUp={()=>goAuth('signup')}/>}
                </div>
              </div>
            </>
          )}

          <div className="stepper">
            <button onClick={()=>{ setGuest(v=>!v); if(!guest) setPage('place'); else setPage('signin'); }} style={{background: guest?'var(--indigo-600)':'transparent', color: guest?'#fff':'var(--fg-3)'}}>
              {guest ? 'guest' : 'auth'}
            </button>
            <div style={{width:1, background:'var(--border-1)', margin:'4px 2px'}}/>
            {['signin','signup','upload','place','sending','sign','sent','contacts','r-email','r-prep','r-fill','r-review','r-done'].map(s=>(
              <button key={s} className={page===s?'on':''} onClick={()=>setPage(s)}>{s}</button>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
