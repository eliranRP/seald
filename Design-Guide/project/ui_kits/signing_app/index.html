<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sealed — Signing App</title>
    <link rel="stylesheet" href="../../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--ink-50);
      }
      #root {
        font-family: var(--font-sans);
        color: var(--fg-2);
      }
      .stepper {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 50;
        display: flex;
        gap: 6;
        background: #fff;
        border: 1px solid var(--border-1);
        border-radius: 999px;
        padding: 4px;
        box-shadow: var(--shadow-md);
        font-family: var(--font-sans);
      }
      .stepper button {
        border: none;
        background: transparent;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: var(--fg-3);
        cursor: pointer;
      }
      .stepper button.on {
        background: var(--ink-900);
        color: #fff;
      }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="../_shared/components.jsx"></script>
    <script type="text/babel" src="./Screens.jsx"></script>
    <script type="text/babel">
      const { useState, useEffect } = React;
      function App() {
        const [page, setPage] = useState(() => localStorage.getItem('sealed.page') || 'place');
        const [contacts, setContacts] = useContacts();
        useEffect(() => {
          localStorage.setItem('sealed.page', page);
        }, [page]);
        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        });

        const showFlow = (step) => setPage(step);

        return (
          <div data-screen-label={`Signing App — ${page}`}>
            <TopNav
              active={page === 'contacts' ? 'contacts' : 'documents'}
              onLogo={() => setPage('upload')}
              onNav={(k) => {
                if (k === 'contacts') setPage('contacts');
                else setPage('place');
              }}
            />
            {page === 'contacts' ? (
              <ContactsScreen contacts={contacts} setContacts={setContacts} />
            ) : (
              <div style={{ display: 'flex' }}>
                {page !== 'place' && <LeftRail active={page === 'upload' ? 'drafts' : 'sent'} />}
                <div style={{ flex: 1, minWidth: 0 }}>
                  {page === 'upload' && <UploadScreen onNext={() => setPage('place')} />}
                  {page === 'place' && (
                    <PlaceFieldsScreen
                      contacts={contacts}
                      setContacts={setContacts}
                      onNext={() => setPage('sign')}
                      onBack={() => setPage('upload')}
                    />
                  )}
                  {page === 'sign' && (
                    <SignScreen onDone={() => setPage('sent')} onBack={() => setPage('place')} />
                  )}
                  {page === 'sent' && <SentScreen onReset={() => setPage('upload')} />}
                </div>
              </div>
            )}

            <div className="stepper">
              {['upload', 'place', 'sign', 'sent', 'contacts'].map((s) => (
                <button key={s} className={page === s ? 'on' : ''} onClick={() => setPage(s)}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
