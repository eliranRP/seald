<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sealed — Signing App</title>
    <link rel="stylesheet" href="../../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--ink-50);
      }
      #root {
        font-family: var(--font-sans);
        color: var(--fg-2);
      }
      .layout-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 50;
        background: #fff;
        border: 1px solid var(--border-1);
        border-radius: 999px;
        padding: 4px;
        display: flex;
        gap: 2px;
        box-shadow: var(--shadow-md);
        font-family: var(--font-sans);
      }
      .layout-toggle button {
        border: none;
        background: transparent;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: var(--fg-3);
        cursor: pointer;
      }
      .layout-toggle button.on {
        background: var(--indigo-600);
        color: #fff;
      }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="../_shared/components.jsx"></script>
    <script type="text/babel" src="./Screens.jsx"></script>
    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [step, setStep] = useState(() => localStorage.getItem('sealed.step') || 'upload');
        const [layout, setLayout] = useState(
          () => localStorage.getItem('sealed.layout') || 'split',
        );
        useEffect(() => {
          localStorage.setItem('sealed.step', step);
          localStorage.setItem('sealed.layout', layout);
        }, [step, layout]);
        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [step, layout]);

        return (
          <div data-screen-label={`Signing App — ${step}`}>
            <TopNav onLogo={() => setStep('upload')} />
            <div style={{ display: 'flex' }}>
              <LeftRail active={step === 'upload' ? 'drafts' : 'sent'} onPick={() => {}} />
              <div style={{ flex: 1, minWidth: 0 }}>
                {step === 'upload' && <UploadScreen onNext={() => setStep('place')} />}
                {step === 'place' && (
                  <PlaceFieldsScreen
                    layout={layout}
                    onNext={() => setStep('sign')}
                    onBack={() => setStep('upload')}
                  />
                )}
                {step === 'sign' && (
                  <SignScreen onDone={() => setStep('sent')} onBack={() => setStep('place')} />
                )}
                {step === 'sent' && <SentScreen onReset={() => setStep('upload')} />}
              </div>
            </div>

            {step === 'place' && (
              <div className="layout-toggle">
                <button
                  className={layout === 'split' ? 'on' : ''}
                  onClick={() => setLayout('split')}
                >
                  Right rail
                </button>
                <button className={layout === 'left' ? 'on' : ''} onClick={() => setLayout('left')}>
                  Left rail
                </button>
              </div>
            )}

            <div
              style={{
                position: 'fixed',
                bottom: 20,
                left: 20,
                zIndex: 50,
                display: 'flex',
                gap: 6,
                background: '#fff',
                border: '1px solid var(--border-1)',
                borderRadius: 999,
                padding: '4px',
                boxShadow: 'var(--shadow-md)',
              }}
            >
              {['upload', 'place', 'sign', 'sent'].map((s, i) => (
                <button
                  key={s}
                  onClick={() => setStep(s)}
                  style={{
                    border: 'none',
                    background: step === s ? 'var(--ink-900)' : 'transparent',
                    color: step === s ? '#fff' : 'var(--fg-3)',
                    padding: '6px 12px',
                    borderRadius: 999,
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: 'pointer',
                    fontFamily: 'var(--font-sans)',
                  }}
                >
                  {i + 1}. {s}
                </button>
              ))}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
