<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seald — Signature Settings (Design Guide)</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Dancing+Script:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: var(--ink-50); overflow-x: hidden; }
    *, *::before, *::after { box-sizing: border-box; }
    #root { font-family: var(--font-sans); color: var(--fg-2); min-height: 100vh; }

    .stepper {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
      display: flex; gap: 6px; background: #fff; border: 1px solid var(--border-1);
      border-radius: 18px; padding: 6px; box-shadow: var(--shadow-md);
    }
    .stepper button {
      border: none; background: transparent; padding: 7px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600; color: var(--fg-3); cursor: pointer;
    }
    .stepper button:hover { background: var(--ink-50); color: var(--fg-1); }
    .stepper button.on { background: var(--ink-900); color: #fff; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft {
      from { transform: translateX(-100%) translateY(-50%); opacity: 0; }
      to   { transform: translateX(0) translateY(-50%); opacity: 1; }
    }
    @keyframes signPop { 0% { transform: scale(1); } 40% { transform: scale(1.05); } 100% { transform: scale(1); } }

    /* Header */
    .hdr {
      position: sticky; top: 0; z-index: 30; height: 52px;
      background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-1);
      display: flex; align-items: center; padding: 0 16px; gap: 12;
    }
    .hdr select { border: 1px solid var(--border-1); border-radius: 6px; padding: 4px 8px; font-size: 12px; background: #fff; color: var(--fg-2); }

    /* Main layout: left gutter + PDF + right sidebar */
    .main { display: flex; min-height: calc(100vh - 52px); }
    .gutter { width: 48px; flex-shrink: 0; background: var(--ink-100); border-right: 1px solid var(--border-1); position: relative; }
    .center { flex: 1; background: #e8e8e8; display: flex; justify-content: center; padding: 28px 0 100px; overflow-y: auto; }
    .sidebar { width: 280px; flex-shrink: 0; background: #fff; border-left: 1px solid var(--border-1); padding: 20px 16px; display: flex; flex-direction: column; }

    /* PDF page */
    .page {
      width: 520px; min-height: 700px; background: #fff;
      box-shadow: var(--shadow-md); border-radius: 2px;
      padding: 40px 38px; font-size: 12px; color: var(--fg-1);
      line-height: 1.7; position: relative;
    }
    .page h4 { font-size: 13px; font-weight: 700; margin: 14px 0 4px; }
    .page table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 6px 0; }
    .page th { text-align: left; font-weight: 700; font-size: 10px; padding: 3px 6px; border-bottom: 1px solid var(--border-2); }
    .page td { padding: 3px 6px; border-bottom: 1px solid var(--border-1); }

    /* Fields on PDF */
    .fld {
      position: absolute; border-radius: 6px; display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center; padding: 4px 10px; gap: 1px;
      cursor: pointer; transition: background 140ms, box-shadow 200ms;
    }
    .fld.uf { border: 1.5px dashed; }
    .fld.ac { box-shadow: 0 0 0 4px rgba(99,102,241,.15); }
    .fld.fi { border: 1.5px solid; animation: signPop 300ms; }
    .fld .fl { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
    .fld .ln { width: 65%; height: 0; border-bottom: 1.5px solid; opacity: .4; align-self: center; }

    /* Left gutter: margin indicator */
    .gutter-dot {
      position: absolute; right: -1px; width: 32px; height: 28px;
      background: #C0392B; border-radius: 6px 0 0 6px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(192,57,43,.2);
    }
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/_shared/components.jsx"></script>
<script type="text/babel" src="./SignatureSettingsPanel.jsx"></script>
<script type="text/babel" src="./SignatureCaptureModal.jsx"></script>
<script type="text/babel" src="./ReviewSidebar.jsx"></script>
<script type="text/babel">
const { useState } = React;
const NAME = 'Eliran Azulay, Managing Member';
const INI  = 'EAMM';

const SCREENS = [
  { id:'idle',       label:'1. Start' },
  { id:'at-field',   label:'2. At field' },
  { id:'one-signed', label:'3. Signed → Next' },
  { id:'scrolled',   label:'4. Scrolled away' },
  { id:'all-done',   label:'5. All done' },
  { id:'modal',      label:'6. Edit signature' },
];

const FLD = {
  sig: { x:190, y:400, w:180, h:50 },
  ini: { x:190, y:470, w:80,  h:36 },
};

function App() {
  const [screen, setScreen] = useState('idle');
  const [modalOpen, setModalOpen] = useState(false);

  const sigSigned = ['one-signed','scrolled','all-done','modal'].includes(screen);
  const iniSigned = screen === 'all-done';
  const sigActive = screen === 'at-field';
  const iniActive = screen === 'one-signed';
  const filled = iniSigned ? 2 : (sigSigned ? 1 : 0);
  const showStart = screen === 'idle' || screen === 'scrolled';
  const showNext  = screen === 'one-signed';

  function fldClick(kind) {
    if (screen === 'at-field')   setScreen('one-signed');
    if (screen === 'one-signed') setScreen('all-done');
  }

  return (
    <div>
      {/* Header */}
      <div className="hdr">
        <select><option>UNCONDITIONAL WAIVER - 5.05.2026</option></select>
        <div style={{ flex:1 }} />
      </div>

      <div className="main">
        {/* Left gutter with margin indicators */}
        <div className="gutter">
          {sigActive && <div className="gutter-dot" style={{ top: FLD.sig.y + 10 }}><Icon name="pen-tool" size={13} style={{ color:'#fff' }}/></div>}
          {iniActive && <div className="gutter-dot" style={{ top: FLD.ini.y + 4 }}><Icon name="pen-tool" size={13} style={{ color:'#fff' }}/></div>}
        </div>

        {/* Center: PDF */}
        <div className="center">
          <div className="page">
            <h4 style={{ fontSize:14, marginTop:0 }}>UNCONDITIONAL WAIVER AND RELEASE ON FINAL PAYMENT</h4>
            <p><strong>Project:</strong> 624 Orchard Hill Dr, Pittsburgh, PA 15238</p>
            <p><strong>Contract Date:</strong> After contract works</p>
            <p><strong>Original Contract Amount:</strong></p>
            <p><strong>Final Contract Amount</strong> (including all change orders): $__________</p>
            <h4>PAYMENT ACKNOWLEDGMENT</h4>
            <p>The undersigned Contractor acknowledges the following payments for the above-referenced Project.</p>
            <h4 style={{ fontSize:11 }}>PREVIOUSLY PAID AMOUNTS:</h4>
            <table><thead><tr><th>Category</th><th>Description</th><th>Amount</th></tr></thead>
            <tbody>
              <tr><td>Outside</td><td>Paint of concrete platform</td><td>$125.00</td></tr>
              <tr><td>Transport</td><td>Take Box to garbage</td><td>$180.00</td></tr>
              <tr><td>Transport</td><td>Take Material to Hayson</td><td>$150.00</td></tr>
              <tr><td>Outside Work</td><td>Organize sidewalk from main stairs to entrance</td><td>$300.00</td></tr>
              <tr><td>Outside Work-Material</td><td></td><td>$76.59</td></tr>
            </tbody></table>
            <p style={{ fontWeight:700, marginTop:8 }}>SUBTOTAL (PREVIOUSLY PAID) <span style={{ float:'right' }}>$831.59</span></p>

            {/* Signature field */}
            <div className={`fld ${sigSigned?'fi':'uf'} ${sigActive?'ac':''}`}
              style={{
                left:FLD.sig.x, top:FLD.sig.y, width:FLD.sig.w, height:FLD.sig.h,
                borderColor: sigSigned?'var(--success-500)':(sigActive?'var(--indigo-500)':'rgba(212,129,122,1)'),
                background: sigSigned?'rgba(16,185,129,.06)':(sigActive?'rgba(99,102,241,.06)':'rgba(212,129,122,.08)'),
                color: sigSigned?'var(--success-700)':(sigActive?'var(--indigo-700)':'#8B4513'),
              }}
              onClick={() => fldClick('sig')}>
              {sigSigned ? (
                <><span className="fl"><Icon name="check" size={11}/> Signed</span>
                <span style={{ fontFamily:"'Caveat',cursive", fontSize:15, color:'var(--fg-1)', fontWeight:500 }}>{NAME}</span></>
              ) : (
                <><span className="fl"><Icon name="pen-tool" size={11}/> Signature</span><span className="ln" style={{ borderColor:'inherit' }}/></>
              )}
            </div>

            {/* Initials field */}
            <div className={`fld ${iniSigned?'fi':'uf'} ${iniActive?'ac':''}`}
              style={{
                left:FLD.ini.x, top:FLD.ini.y, width:FLD.ini.w, height:FLD.ini.h,
                borderColor: iniSigned?'var(--success-500)':(iniActive?'var(--indigo-500)':'rgba(212,129,122,1)'),
                background: iniSigned?'rgba(16,185,129,.06)':(iniActive?'rgba(99,102,241,.06)':'rgba(212,129,122,.08)'),
                color: iniSigned?'var(--success-700)':(iniActive?'var(--indigo-700)':'#8B4513'),
              }}
              onClick={() => fldClick('ini')}>
              {iniSigned ? (
                <span className="fl"><Icon name="check" size={10}/> <span style={{ fontFamily:"'Caveat',cursive", fontSize:16 }}>{INI}</span></span>
              ) : (
                <><span className="fl" style={{ fontSize:10 }}><Icon name="type" size={10}/> Initials</span><span className="ln" style={{ borderColor:'inherit' }}/></>
              )}
            </div>
          </div>
        </div>

        {/* Right sidebar */}
        <div className="sidebar">
          <SignOptionsPanel
            signerName={NAME}
            filled={filled} total={2}
            onEditSignature={() => { setScreen('modal'); setModalOpen(true); }}
            onDecline={() => alert('Decline')}
            onRefuse={() => alert('Refuse')}
            onSign={() => alert('Sign')}
          />
        </div>
      </div>

      {/* Left margin: Start / Next */}
      {showStart && <LeftMarginButton label="Start" icon="pen-tool" onClick={() => setScreen('at-field')} />}
      {showNext  && <LeftMarginButton label="Next"  icon="arrow-right" onClick={() => setScreen('at-field')} />}

      {/* Signature details modal */}
      <SignatureCaptureModal
        open={modalOpen || screen === 'modal'}
        signerName={NAME}
        onCancel={() => { setModalOpen(false); if (screen === 'modal') setScreen('one-signed'); }}
        onApply={() => { setModalOpen(false); if (screen === 'modal') setScreen('one-signed'); }}
      />

      {/* Stepper */}
      <div className="stepper">
        {SCREENS.map(s => (
          <button key={s.id} className={screen === s.id ? 'on' : ''} onClick={() => { setScreen(s.id); setModalOpen(s.id === 'modal'); }}>
            {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
