<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seald — Signature Settings (Design Guide)</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Dancing+Script:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: var(--ink-50); }
    *, *::before, *::after { box-sizing: border-box; }
    #root { font-family: var(--font-sans); color: var(--fg-2); min-height: 100vh; }

    /* Stepper */
    .stepper {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      display: flex; gap: 6px; flex-wrap: wrap; max-width: calc(100vw - 40px);
      background: #fff; border: 1px solid var(--border-1);
      border-radius: 18px; padding: 6px;
      box-shadow: var(--shadow-md); font-family: var(--font-sans);
    }
    .stepper button {
      border: none; background: transparent;
      padding: 7px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600; color: var(--fg-3); cursor: pointer;
      transition: background 120ms var(--ease-standard), color 120ms;
    }
    .stepper button:hover { background: var(--ink-50); color: var(--fg-1); }
    .stepper button.on { background: var(--ink-900); color: #fff; }
    .stepper .sep { width: 1px; background: var(--border-1); margin: 4px 4px; }
    .stepper .group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--fg-4);
      align-self: center; padding: 0 6px 0 8px;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Recipient header — matches RecipientHeader.styles.ts */
    .recipient-header {
      position: sticky; top: 0; z-index: 30;
      height: 60px; min-height: 60px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-1);
      display: flex; align-items: center;
      padding: 0 24px; gap: 20px;
    }
    .recipient-header .divider {
      width: 1px; height: 18px; background: var(--border-1);
    }
    .recipient-header .title {
      font-size: 14px; font-weight: 600; color: var(--fg-1);
    }
    .recipient-header .meta {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--fg-3);
    }
    .recipient-header .chip {
      padding: 4px 12px; background: var(--ink-100);
      border-radius: 999px; font-size: 11px;
      font-weight: 600; color: var(--fg-2);
    }

    /* PDF canvas area */
    .pdf-canvas {
      flex: 1; display: flex; align-items: flex-start;
      justify-content: center; padding: 32px 0;
      background: #e8e8e8;
      min-height: calc(100vh - 60px);
    }
    .pdf-page {
      width: 560px; min-height: 740px; background: #fff;
      box-shadow: var(--shadow-md); border-radius: 2px;
      padding: 48px 44px; font-size: 14px; color: var(--fg-1);
      line-height: 1.7; position: relative;
    }
    .pdf-page h4 { font-size: 15px; font-weight: 700; margin: 20px 0 8px; }
    .sig-box {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1.5px dashed var(--indigo-400); border-radius: 8px;
      background: rgba(99, 102, 241, 0.08);
      color: var(--indigo-700); font-size: 12px; font-weight: 600;
      padding: 4px 12px; gap: 6px;
    }

    /* Layout */
    .signing-layout {
      display: flex; min-height: calc(100vh - 60px);
    }
    .sidebar-area {
      width: 360px; display: flex; align-items: flex-start;
      justify-content: center; padding: 32px 20px;
      border-left: 1px solid var(--border-1);
      background: var(--ink-50);
    }
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shared UI -->
  <script type="text/babel" src="../ui_kits/_shared/components.jsx"></script>

  <!-- Feature modules -->
  <script type="text/babel" src="./SignatureSettingsPanel.jsx"></script>
  <script type="text/babel" src="./SignatureCaptureModal.jsx"></script>
  <script type="text/babel" src="./ReviewSidebar.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const SCREEN_GROUPS = [
      {
        label: 'Sidebar',
        screens: [
          { id: 'review-both',     label: 'Sig + Initials' },
          { id: 'review-sig-only', label: 'Sig only' },
          { id: 'review-done',     label: 'All filled' },
        ],
      },
      {
        label: 'Capture',
        screens: [
          { id: 'edit-signature', label: 'Edit signature' },
          { id: 'edit-initials',  label: 'Edit initials' },
        ],
      },
    ];

    const SIGNER = 'Eliran Azulay, Managing Member';

    function RecipientHeader() {
      return (
        <div className="recipient-header">
          <img src="../assets/logo.svg" height="22" alt="Seald" />
          <div className="divider" />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="title">Lien Waiver — NRO Momentum</div>
            <div className="meta">CODE XYZA123 · 3 pages</div>
          </div>
          <div className="chip">
            <span>Step 2 of 3</span>
          </div>
        </div>
      );
    }

    function FakePdf() {
      return (
        <div className="pdf-page">
          <h4>EFFECTIVE DATE</h4>
          <p>This Waiver and Release shall be effective immediately upon execution.</p>
          <p>Date: May 5, 2026</p>
          <div style={{ marginTop: 32 }}>
            <p><strong>Owner:</strong> LLC NRO Momentum</p>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '14px 0' }}>
              <span>Owner Signature:</span>
              <span className="sig-box" style={{ width: 200, height: 56, flexDirection: 'column', gap: 2 }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <Icon name="pen-tool" size={12} /> Signature
                </span>
                <span style={{ width: '70%', height: 0, borderBottom: '1px solid var(--indigo-300)' }} />
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '14px 0' }}>
              <span>Owner Initials:</span>
              <span className="sig-box" style={{ width: 90, height: 44, flexDirection: 'column', gap: 2 }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11 }}>
                  <Icon name="type" size={11} /> Initials
                </span>
                <span style={{ width: '60%', height: 0, borderBottom: '1px solid var(--indigo-300)' }} />
              </span>
            </div>
            <p><strong>Owner Printed Name:</strong> Eliran Azulay, Managing Member</p>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('review-both');

      const sidebarState = (opts = {}) => ({
        signerName: SIGNER,
        signatureImage: null,
        initialsImage: null,
        hasSignatureFields: true,
        hasInitialsFields: opts.noInitials ? false : true,
        remainingFields: opts.done ? 0 : (opts.noInitials ? 1 : 2),
      });

      const showModal = screen === 'edit-signature' || screen === 'edit-initials';

      return (
        <div>
          <RecipientHeader />

          <div className="signing-layout">
            {/* PDF area */}
            <div className="pdf-canvas">
              <FakePdf />
            </div>

            {/* Sidebar */}
            <div className="sidebar-area" style={{ opacity: showModal ? 0.3 : 1, pointerEvents: showModal ? 'none' : 'auto' }}>
              <ReviewSidebar
                state={sidebarState({
                  noInitials: screen === 'review-sig-only',
                  done: screen === 'review-done',
                })}
                onEditSignature={() => setScreen('edit-signature')}
                onEditInitials={() => setScreen('edit-initials')}
                onDecline={() => alert('Decline clicked')}
                onSign={() => alert('Sign clicked')}
              />
            </div>
          </div>

          {/* Capture modal */}
          <SignatureCaptureModal
            open={showModal}
            kind={screen === 'edit-initials' ? 'initials' : 'signature'}
            signerName={SIGNER}
            onCancel={() => setScreen('review-both')}
            onApply={() => setScreen('review-both')}
          />

          {/* Stepper */}
          <div className="stepper">
            {SCREEN_GROUPS.map((g, gi) => (
              <React.Fragment key={g.label}>
                {gi > 0 && <div className="sep" />}
                <span className="group-label">{g.label}</span>
                {g.screens.map(s => (
                  <button key={s.id} className={screen === s.id ? 'on' : ''} onClick={() => setScreen(s.id)}>
                    {s.label}
                  </button>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
