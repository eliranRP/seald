<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Colors — Primary</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Primary — indigo</div>
      <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px">
        <div>
          <div style="height: 84px; border-radius: 12px; background: #eef2ff"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">50</div>
          <div class="meta">#EEF2FF</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #e0e7ff"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">100</div>
          <div class="meta">#E0E7FF</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #c7d2fe"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">200</div>
          <div class="meta">#C7D2FE</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #a5b4fc"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">300</div>
          <div class="meta">#A5B4FC</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #818cf8"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">400</div>
          <div class="meta">#818CF8</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #6366f1"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">500</div>
          <div class="meta">#6366F1</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #4f46e5; position: relative">
            <div
              style="
                position: absolute;
                top: 8px;
                right: 10px;
                font-size: 10px;
                font-weight: 600;
                color: #fff;
                letter-spacing: 0.08em;
              "
            >
              BRAND
            </div>
          </div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">600</div>
          <div class="meta">#4F46E5</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #4338ca"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">700</div>
          <div class="meta">#4338CA</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #3730a3"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">800</div>
          <div class="meta">#3730A3</div>
        </div>
        <div>
          <div style="height: 84px; border-radius: 12px; background: #312e81"></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">900</div>
          <div class="meta">#312E81</div>
        </div>
      </div>
      <div
        style="
          padding: 14px 16px;
          background: var(--indigo-50);
          border-radius: 10px;
          color: var(--indigo-700);
          font-size: 13px;
        "
      >
        Indigo 600 is the brand primary — used for CTAs, focus rings, and links. Lighter tints used
        for backgrounds; deeper tints only for hover/press.
      </div>
    </div>
  </body>
</html>
