<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Iconography</title>
    <link rel="stylesheet" href="_card.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div class="card">
      <div class="label">Iconography · Lucide · 1.75px stroke · currentColor</div>
      <div
        style="
          display: grid;
          grid-template-columns: repeat(8, 1fr);
          gap: 14px;
          color: var(--fg-2);
          font-size: 11px;
        "
      >
        <div style="text-align: center">
          <i data-lucide="pen-tool" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">pen-tool</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="file-signature" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">file-signature</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="file-text" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">file-text</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="upload-cloud" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">upload-cloud</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="send" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">send</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="check-circle-2" style="width: 22px; height: 22px; color: #10b981"></i>
          <div class="meta" style="margin-top: 6px">check-circle-2</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="shield-check" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">shield-check</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="clock" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">clock</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="users" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">users</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="download" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">download</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="inbox" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">inbox</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="mail" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">mail</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="lock" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">lock</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="more-horizontal" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">more</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="arrow-right" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">arrow-right</div>
        </div>
        <div style="text-align: center">
          <i data-lucide="circle-dashed" style="width: 22px; height: 22px"></i>
          <div class="meta" style="margin-top: 6px">circle-dashed</div>
        </div>
      </div>
      <script>
        lucide.createIcons();
      </script>
    </div>
  </body>
</html>
