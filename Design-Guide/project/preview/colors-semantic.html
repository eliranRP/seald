<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Colors — Semantic</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Semantic — success / warning / danger / info</div>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px">
        <div>
          <div
            style="
              height: 60px;
              border-radius: 10px;
              background: #ecfdf5;
              border: 1px solid #a7f3d0;
            "
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #10b981; margin-top: 6px"
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #047857; margin-top: 6px"
          ></div>
          <div style="margin-top: 8px; font-size: 13px; font-weight: 600">Success · signed</div>
          <div class="meta">emerald 50 / 500 / 700</div>
        </div>
        <div>
          <div
            style="
              height: 60px;
              border-radius: 10px;
              background: #fffbeb;
              border: 1px solid #fde68a;
            "
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #f59e0b; margin-top: 6px"
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #b45309; margin-top: 6px"
          ></div>
          <div style="margin-top: 8px; font-size: 13px; font-weight: 600">Warning · awaiting</div>
          <div class="meta">amber 50 / 500 / 700</div>
        </div>
        <div>
          <div
            style="
              height: 60px;
              border-radius: 10px;
              background: #fef2f2;
              border: 1px solid #fecaca;
            "
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #ef4444; margin-top: 6px"
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #b91c1c; margin-top: 6px"
          ></div>
          <div style="margin-top: 8px; font-size: 13px; font-weight: 600">Danger · declined</div>
          <div class="meta">red 50 / 500 / 700</div>
        </div>
        <div>
          <div
            style="
              height: 60px;
              border-radius: 10px;
              background: #eff6ff;
              border: 1px solid #bfdbfe;
            "
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #3b82f6; margin-top: 6px"
          ></div>
          <div
            style="height: 60px; border-radius: 10px; background: #1d4ed8; margin-top: 6px"
          ></div>
          <div style="margin-top: 8px; font-size: 13px; font-weight: 600">Info · neutral</div>
          <div class="meta">blue 50 / 500 / 700</div>
        </div>
      </div>
    </div>
  </body>
</html>
