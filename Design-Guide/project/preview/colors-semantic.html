<!doctype html><html><head><meta charset="utf-8"><title>Colors — Semantic</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Semantic — success / warning / danger / info</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div>
      <div style="height:60px;border-radius:10px;background:#ECFDF5;border:1px solid #A7F3D0"></div>
      <div style="height:60px;border-radius:10px;background:#10B981;margin-top:6px"></div>
      <div style="height:60px;border-radius:10px;background:#047857;margin-top:6px"></div>
      <div style="margin-top:8px;font-size:13px;font-weight:600">Success · signed</div>
      <div class="meta">emerald 50 / 500 / 700</div>
    </div>
    <div>
      <div style="height:60px;border-radius:10px;background:#FFFBEB;border:1px solid #FDE68A"></div>
      <div style="height:60px;border-radius:10px;background:#F59E0B;margin-top:6px"></div>
      <div style="height:60px;border-radius:10px;background:#B45309;margin-top:6px"></div>
      <div style="margin-top:8px;font-size:13px;font-weight:600">Warning · awaiting</div>
      <div class="meta">amber 50 / 500 / 700</div>
    </div>
    <div>
      <div style="height:60px;border-radius:10px;background:#FEF2F2;border:1px solid #FECACA"></div>
      <div style="height:60px;border-radius:10px;background:#EF4444;margin-top:6px"></div>
      <div style="height:60px;border-radius:10px;background:#B91C1C;margin-top:6px"></div>
      <div style="margin-top:8px;font-size:13px;font-weight:600">Danger · declined</div>
      <div class="meta">red 50 / 500 / 700</div>
    </div>
    <div>
      <div style="height:60px;border-radius:10px;background:#EFF6FF;border:1px solid #BFDBFE"></div>
      <div style="height:60px;border-radius:10px;background:#3B82F6;margin-top:6px"></div>
      <div style="height:60px;border-radius:10px;background:#1D4ED8;margin-top:6px"></div>
      <div style="margin-top:8px;font-size:13px;font-weight:600">Info · neutral</div>
      <div class="meta">blue 50 / 500 / 700</div>
    </div>
  </div>
</div></body></html>
