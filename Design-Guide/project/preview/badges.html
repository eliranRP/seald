<!doctype html><html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Status badges</div>
  <style>
    .b{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;border-radius:999px;font:600 12px var(--font-sans);letter-spacing:0.01em}
    .dot{width:6px;height:6px;border-radius:999px}
  </style>
  <div style="display:flex;flex-wrap:wrap;gap:10px">
    <span class="b" style="background:#EEF2FF;color:#3730A3"><span class="dot" style="background:#4F46E5"></span>Awaiting you</span>
    <span class="b" style="background:#FFFBEB;color:#B45309"><span class="dot" style="background:#F59E0B"></span>Awaiting others</span>
    <span class="b" style="background:#ECFDF5;color:#047857"><span class="dot" style="background:#10B981"></span>Completed</span>
    <span class="b" style="background:#FEF2F2;color:#B91C1C"><span class="dot" style="background:#EF4444"></span>Declined</span>
    <span class="b" style="background:var(--ink-100);color:var(--fg-3)"><span class="dot" style="background:var(--fg-4)"></span>Expired</span>
    <span class="b" style="background:var(--ink-100);color:var(--fg-2)"><span class="dot" style="background:var(--fg-3)"></span>Draft</span>
  </div>
  <div class="meta" style="margin-top:4px">6px dot · pill · sentence case label</div>
</div></body></html>
