<!doctype html><html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:var(--ink-50)">
  <div class="label">Cards — default & document row</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="background:#fff;border:1px solid var(--border-1);border-radius:16px;padding:18px">
      <div style="font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--fg-1)">Master services agreement</div>
      <div style="font-size:13px;color:var(--fg-3);margin-top:4px">3 signers · sent Apr 18</div>
      <div style="display:flex;gap:6px;margin-top:14px">
        <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font:600 11px var(--font-sans);background:#FFFBEB;color:#B45309"><span style="width:6px;height:6px;border-radius:999px;background:#F59E0B"></span>Awaiting others</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">DOC‑8F3A</span>
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--border-1);border-radius:16px;padding:18px;display:flex;gap:12px;align-items:center">
      <div style="width:40px;height:52px;background:#fff;border:1px solid var(--border-1);border-radius:4px;position:relative;box-shadow:0 1px 0 rgba(15,23,42,0.04),0 6px 14px rgba(15,23,42,0.06)">
        <div style="position:absolute;left:6px;top:10px;width:20px;height:2px;background:var(--ink-200);border-radius:1px"></div>
        <div style="position:absolute;left:6px;top:16px;width:26px;height:2px;background:var(--ink-200);border-radius:1px"></div>
        <div style="position:absolute;left:6px;top:22px;width:16px;height:2px;background:var(--ink-200);border-radius:1px"></div>
        <div style="position:absolute;left:6px;bottom:8px;font:600 8px var(--font-script);color:#4F46E5">sign</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:15px;color:var(--fg-1)">NDA — Farrow & Wills</div>
        <div style="font-size:13px;color:var(--fg-3);margin-top:2px">Signed by you · 2 min ago</div>
      </div>
      <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font:600 11px var(--font-sans);background:#ECFDF5;color:#047857"><span style="width:6px;height:6px;border-radius:999px;background:#10B981"></span>Completed</span>
    </div>
  </div>
  <div class="meta" style="margin-top:4px">Default = border + no shadow · serif titles · mono doc IDs</div>
</div></body></html>
