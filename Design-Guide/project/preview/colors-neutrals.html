<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Colors — Neutrals</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Neutrals — slate-tinted</div>
      <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px">
        <div style="display: flex; flex-direction: column; gap: 6px">
          <div
            style="
              height: 72px;
              border-radius: 10px;
              background: #ffffff;
              border: 1px solid var(--border-1);
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; color: var(--fg-1)">paper</div>
          <div class="meta">#FFFFFF</div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 6px">
          <div style="height: 72px; border-radius: 10px; background: #f8fafc"></div>

        </div>
