<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Signature field</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card" style="background: var(--ink-50)">
      <div class="label">Signature capture — the one script moment</div>
      <div
        style="
          background: #fff;
          border: 1.5px dashed #a5b4fc;
          border-radius: 16px;
          padding: 28px 24px;
          position: relative;
          min-height: 120px;
        "
      >
        <div
          style="
            font-family: var(--font-script);
            font-size: 52px;
            font-weight: 600;
            color: #0b1220;
            line-height: 1;
          "
        >
          Jamie Okonkwo
        </div>
        <svg width="220" height="8" style="display: block; margin-top: -2px">
          <path
            d="M4 4 Q 70 0 120 4 T 216 4"
            stroke="#4F46E5"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            opacity="0.55"
          />
        </svg>
        <div
          style="
            position: absolute;
            top: 14px;
            right: 16px;
            font: 600 11px var(--font-sans);
            letter-spacing: 0.08em;
            color: #4f46e5;
            text-transform: uppercase;
          "
        >
          Draw or type
        </div>
      </div>
      <div style="display: flex; gap: 20px; font-size: 13px; color: var(--fg-3)">
        <span>Typed · Caveat</span>
        <span>Drawn · stroke #4F46E5 1.75px</span>
        <span>Uploaded image</span>
      </div>
    </div>
  </body>
</html>
