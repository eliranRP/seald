<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Radii</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Corner radii · soft, pillowy</div>
      <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px">
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 6px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">xs</div>
          <div class="meta">6</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 8px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">sm</div>
          <div class="meta">8</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 12px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">md</div>
          <div class="meta">12</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 16px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">lg</div>
          <div class="meta">16</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 20px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">xl</div>
          <div class="meta">20</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 28px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">2xl</div>
          <div class="meta">28</div>
        </div>
        <div style="text-align: center">
          <div
            style="
              height: 64px;
              background: var(--ink-100);
              border: 1px solid var(--border-1);
              border-radius: 999px;
            "
          ></div>
          <div style="font-size: 12px; font-weight: 600; margin-top: 6px">pill</div>
          <div class="meta">999</div>
        </div>
      </div>
    </div>
  </body>
</html>
