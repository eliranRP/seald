<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Verify flow — Sealed</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #E8ECF2; font-family: var(--font-sans); }
  *, *::before, *::after { box-sizing: border-box; }

  /* ========== Browser frame ========== */
  .browser {
    width: 100%;
    height: 100%;
    background: var(--paper);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(15,23,42,0.04), 0 12px 32px rgba(15,23,42,0.10);
    display: flex; flex-direction: column;
  }
  .br-bar {
    height: 44px; background: #E8ECF2;
    border-bottom: 1px solid var(--border-1);
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px; flex-shrink: 0;
  }
  .br-lights { display: flex; gap: 7px; }
  .br-lights span { width: 12px; height: 12px; border-radius: 999px; background: #cbd0d8; }
  .br-lights span.r { background: #fc615d; }
  .br-lights span.y { background: #fdbd40; }
  .br-lights span.g { background: #34c648; }
  .br-url {
    flex: 1; height: 28px;
    background: var(--paper);
    border: 1px solid var(--border-1);
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    font: 500 12px/1 var(--font-sans);
    color: var(--ink-700);
    max-width: 580px; margin: 0 auto;
  }
  .br-url .lock { color: var(--success-500); }
  .br-url .lock svg { width: 12px; height: 12px; display: block; }
  .br-url .host { color: var(--fg-3); }
  .br-url .path { color: var(--ink-900); font-family: var(--font-mono); font-size: 11px; }
  .br-url-actions { display: flex; gap: 8px; color: var(--fg-4); }
  .br-url-actions svg { width: 14px; height: 14px; }
  .br-content { flex: 1; min-height: 0; overflow: hidden; background: var(--paper); }

  /* ========== App nav ========== */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border-1);
  }
  .nav-brand { display: flex; align-items: center; gap: 8px; }
  .nav-brand img { height: 22px; }
  .nav-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--fg-3); }
  .nav-right a { color: var(--fg-2); text-decoration: none; }
  .nav-right .btn-go {
    background: var(--ink-900); color: #fff;
    padding: 7px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
  }

  /* ========== Verify hero (success) ========== */
  .verify-page {
    padding: 56px 48px 48px 48px;
    background:
      radial-gradient(900px 360px at 50% -100px, var(--success-50) 0%, rgba(236,253,245,0) 70%),
      var(--paper);
    min-height: 100%;
  }
  .v-wrap { max-width: 920px; margin: 0 auto; }

  /* ===== verdict ===== */
  .verdict {
    text-align: center;
    margin-bottom: 32px;
  }
  .verdict-mark {
    width: 88px; height: 88px; margin: 0 auto 20px auto;
    border-radius: 999px;
    background: var(--success-50);
    border: 1.5px solid rgba(16,185,129,0.35);
    display: flex; align-items: center; justify-content: center;
    color: var(--success-700);
    position: relative;
  }
  .verdict-mark::before {
    content: ""; position: absolute; inset: -10px;
    border-radius: 999px;
    border: 1.5px solid rgba(16,185,129,0.18);
    animation: pulse 3s var(--ease-standard) infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.95); opacity: 0.8; }
    100% { transform: scale(1.18); opacity: 0; }
  }
  .verdict-mark svg { width: 44px; height: 44px; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .verdict-eyebrow {
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--success-700);
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
  }
  .verdict-eyebrow .dot {
    width: 6px; height: 6px; border-radius: 999px; background: var(--success-500);
  }
  .verdict h1 {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 44px; line-height: 1.05; letter-spacing: -0.02em;
    color: var(--ink-900); margin: 0 0 12px 0;
    text-wrap: balance;
  }
  .verdict h1 em {
    font-style: italic; color: var(--success-700); font-family: var(--font-serif);
  }
  .verdict p {
    color: var(--fg-2); font-size: 16px; line-height: 1.55;
    max-width: 540px; margin: 0 auto;
  }

  /* ===== document card ===== */
  .doc-card {
    background: var(--paper);
    border: 1px solid var(--border-1);
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    overflow: hidden;
  }
  .doc-card-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-1);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    background: var(--ink-50);
  }
  .doc-meta { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .doc-thumb {
    width: 36px; height: 46px;
    background: var(--paper);
    border: 1px solid var(--border-1);
    border-radius: 4px;
    box-shadow: 0 1px 0 rgba(15,23,42,0.04);
    flex-shrink: 0; position: relative;
  }
  .doc-thumb::before, .doc-thumb::after {
    content: ""; position: absolute; left: 5px; right: 5px; height: 2px;
    background: var(--ink-200); border-radius: 1px;
  }
  .doc-thumb::before { top: 8px; }
  .doc-thumb::after { top: 13px; right: 14px; }
  .doc-thumb i {
    position: absolute; left: 5px; right: 5px; height: 2px;
    background: var(--ink-200); border-radius: 1px; top: 18px;
  }
  .doc-thumb i + i { top: 23px; right: 12px; }
  .doc-thumb i + i + i { top: 28px; right: 18px; }
  .doc-info { min-width: 0; flex: 1; }
  .doc-info .title {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 19px; color: var(--ink-900);
    letter-spacing: -0.005em; line-height: 1.2;
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .doc-info .sub {
    font-size: 13px; color: var(--fg-3);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .doc-info .sub .id { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .doc-info .sub .sep { width: 3px; height: 3px; border-radius: 999px; background: var(--ink-300); }

  .doc-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font: 600 13px/1 var(--font-sans);
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid transparent; cursor: pointer; text-decoration: none;
    transition: background 120ms;
  }
  .btn:hover { text-decoration: none; }
  .btn-primary { background: var(--indigo-600); color: #fff; }
  .btn-primary:hover { background: var(--indigo-700); }
  .btn-secondary { background: var(--paper); color: var(--ink-900); border-color: var(--border-1); }
  .btn-secondary:hover { background: var(--ink-50); }
  .btn svg { width: 14px; height: 14px; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: currentColor; }

  /* ===== fact rows ===== */
  .facts {
    padding: 8px 24px 24px 24px;
  }
  .fact {
    display: grid; grid-template-columns: 200px 1fr auto;
    gap: 24px; padding: 14px 0;
    border-bottom: 1px solid var(--border-1);
    align-items: center;
  }
  .fact:last-child { border-bottom: none; }
  .fact-k {
    font-size: 12px; color: var(--fg-3);
    font-weight: 600; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 8px;
  }
  .fact-k svg { width: 14px; height: 14px; color: var(--fg-4); stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: currentColor; }
  .fact-v {
    font-size: 14px; color: var(--ink-900); font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
  }
  .fact-v.mono { font-family: var(--font-mono); font-size: 13px; font-weight: 400; color: var(--ink-700); letter-spacing: -0.005em; }
  .fact-v.hash { font-family: var(--font-mono); font-size: 12px; color: var(--ink-700); word-break: break-all; line-height: 1.5; font-weight: 400; }
  .fact-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 8px;
    border-radius: 999px;
    background: var(--success-50); color: var(--success-700);
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  }
  .fact-tag::before {
    content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--success-500);
  }
  .fact-tag.indigo { background: var(--indigo-50); color: var(--indigo-700); }
  .fact-tag.indigo::before { background: var(--indigo-500); }
  .fact-tag.neutral { background: var(--ink-100); color: var(--fg-2); }
  .fact-tag.neutral::before { background: var(--ink-400); }
  .fact-tag.danger { background: var(--danger-50); color: var(--danger-700); }
  .fact-tag.danger::before { background: var(--danger-500); }
  .fact-tag.warn { background: var(--warn-50); color: var(--warn-700); }
  .fact-tag.warn::before { background: var(--warn-500); }

  .signers-list { display: flex; flex-direction: column; gap: 6px; }
  .signer-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--ink-900);
  }
  .signer-row .av {
    width: 26px; height: 26px; border-radius: 999px; flex-shrink: 0;
    color: #fff; font-weight: 700; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .signer-row .nm { font-weight: 500; }
  .signer-row .em { color: var(--fg-3); font-size: 13px; }
  .signer-row .ck { color: var(--success-500); margin-left: auto; }
  .signer-row .ck svg { width: 14px; height: 14px; }

  /* ===== integrity strip ===== */
  .integrity {
    padding: 16px 24px;
    border-top: 1px solid var(--border-1);
    background: var(--ink-50);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .integrity-inner {
    display: flex; align-items: center; gap: 14px;
  }
  .integrity-ico {
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--success-50); color: var(--success-700);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .integrity-ico svg { width: 16px; height: 16px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: currentColor; }
  .integrity-text { font-size: 13px; color: var(--ink-700); line-height: 1.4; }
  .integrity-text strong { color: var(--ink-900); font-weight: 600; }
  .integrity-meta {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--fg-3);
  }

  /* ========== Detail expanded view ========== */
  .timeline {
    padding: 8px 24px 24px 24px;
  }
  .tl-head {
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--fg-3); text-transform: uppercase;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-1);
  }
  .tl-row {
    display: grid; grid-template-columns: 90px 24px 1fr auto;
    gap: 12px; align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-1);
    position: relative;
  }
  .tl-row:last-child { border-bottom: none; }
  .tl-time {
    font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);
    padding-top: 2px;
  }
  .tl-time .d { color: var(--fg-2); display: block; font-weight: 500; }
  .tl-dot-col {
    position: relative;
    align-self: stretch;
  }
  .tl-dot {
    position: absolute; left: 50%; top: 6px;
    width: 10px; height: 10px; border-radius: 999px;
    background: var(--paper);
    border: 2px solid var(--indigo-500);
    transform: translateX(-50%);
    z-index: 1;
  }
  .tl-dot.success { border-color: var(--success-500); }
  .tl-dot.warn { border-color: var(--warn-500); }
  .tl-line {
    position: absolute; left: 50%; top: 18px; bottom: -12px;
    width: 1px; background: var(--border-1);
    transform: translateX(-50%);
  }
  .tl-row:last-child .tl-line { display: none; }
  .tl-body strong {
    color: var(--ink-900); font-weight: 600; font-size: 14px;
    display: block; margin-bottom: 2px;
  }
  .tl-body span { color: var(--fg-2); font-size: 13px; line-height: 1.5; }
  .tl-body .tl-meta { color: var(--fg-3); font-size: 12px; margin-top: 4px; display: block; font-family: var(--font-mono); }
  .tl-actor {
    font-size: 12px; color: var(--fg-3);
    text-align: right; padding-top: 2px;
  }
  .tl-actor .nm { color: var(--ink-900); font-weight: 500; display: block; font-family: var(--font-sans); font-size: 13px; }
  .tl-actor .ip { font-family: var(--font-mono); }

  /* ========== Altered / failed state ========== */
  .verdict.failed .verdict-mark {
    background: var(--danger-50);
    border-color: rgba(239,68,68,0.35);
    color: var(--danger-700);
  }
  .verdict.failed .verdict-mark::before { border-color: rgba(239,68,68,0.18); }
  .verdict.failed .verdict-eyebrow { color: var(--danger-700); }
  .verdict.failed .verdict-eyebrow .dot { background: var(--danger-500); }
  .verdict.failed h1 em { color: var(--danger-700); }
  .verdict.failed { /* override hero bg */ }
  .verify-page.failed {
    background:
      radial-gradient(900px 360px at 50% -100px, var(--danger-50) 0%, rgba(254,242,242,0) 70%),
      var(--paper);
  }
  .alert-banner {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 18px;
    background: var(--danger-50);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .alert-banner .ico {
    width: 28px; height: 28px; border-radius: 999px;
    background: rgba(239,68,68,0.14); color: var(--danger-700);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .alert-banner .ico svg { width: 14px; height: 14px; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: currentColor; }
  .alert-banner .body strong {
    display: block; color: var(--danger-700); font-weight: 600;
    font-size: 14px; margin-bottom: 2px;
  }
  .alert-banner .body span {
    color: var(--ink-700); font-size: 13px; line-height: 1.5;
  }
  .integrity.failed { background: var(--danger-50); }
  .integrity.failed .integrity-ico { background: rgba(239,68,68,0.14); color: var(--danger-700); }

  .hash-compare {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .hash-card {
    border: 1px solid var(--border-1);
    border-radius: 10px;
    padding: 12px 14px;
    background: var(--paper);
  }
  .hash-card .lab {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--fg-3); font-weight: 600; margin-bottom: 6px;
  }
  .hash-card .val {
    font-family: var(--font-mono); font-size: 11.5px;
    color: var(--ink-900); word-break: break-all; line-height: 1.5;
  }
  .hash-card.expected { background: var(--success-50); border-color: rgba(16,185,129,0.3); }
  .hash-card.expected .val { color: var(--success-700); }
  .hash-card.actual { background: var(--danger-50); border-color: rgba(239,68,68,0.3); }
  .hash-card.actual .val { color: var(--danger-700); }
  .hash-diff {
    background: rgba(239,68,68,0.18);
    color: var(--danger-700);
    padding: 0 2px; border-radius: 2px;
  }

  /* ========== Mobile / scan-just-happened ========== */
  .mobile-scan-stage {
    background: linear-gradient(180deg, #0B1220, #1F2937);
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
  }
  .phone {
    width: 320px; height: 660px;
    background: var(--ink-900);
    border-radius: 38px;
    padding: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    position: relative;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: var(--paper);
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .phone-statusbar {
    height: 36px; padding: 0 22px;
    display: flex; align-items: center; justify-content: space-between;
    font: 600 13px/1 var(--font-sans);
    color: var(--ink-900);
    flex-shrink: 0; padding-top: 8px;
  }
  .phone-statusbar .right svg { width: 14px; height: 14px; margin-left: 4px; }
  .phone-notch {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 28px;
    background: #000; border-radius: 999px;
    z-index: 5;
  }
  .phone-content {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 16px 20px 28px 20px;
  }
  .phone-content .verdict-mark { width: 64px; height: 64px; }
  .phone-content .verdict-mark svg { width: 32px; height: 32px; }
  .phone-content .verdict h1 { font-size: 26px; }
  .phone-content .verdict p { font-size: 13px; }
  .phone-content .verdict { margin-bottom: 20px; }
  .phone-content .doc-card-head { padding: 14px 16px; gap: 10px; }
  .phone-content .doc-info .title { font-size: 15px; white-space: normal; }
  .phone-content .doc-info .sub { font-size: 11px; }
  .phone-content .doc-actions { display: none; }
  .phone-content .facts { padding: 4px 16px 16px 16px; }
  .phone-content .fact { grid-template-columns: 1fr; gap: 4px; padding: 10px 0; }
  .phone-content .fact-v { font-size: 13px; }
  .phone-content .integrity { padding: 12px 16px; }
  .phone-content .integrity-text { font-size: 11.5px; }
  .phone-content .integrity-meta { display: none; }

  /* ========== Trust footer ========== */
  .trust-footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border-1);
    display: flex; align-items: center; justify-content: space-between;
    color: var(--fg-3); font-size: 12px;
    gap: 16px;
  }
  .trust-footer .lf { display: flex; align-items: center; gap: 8px; }
  .trust-footer .lf img { height: 18px; opacity: 0.7; }
  .trust-footer .rt { display: flex; gap: 16px; }
  .trust-footer .rt span { display: inline-flex; align-items: center; gap: 6px; }
  .trust-footer .rt svg { width: 12px; height: 12px; color: var(--success-500); }

  /* ========== "What this means" sidebar (detail variant) ========== */
  .meaning {
    background: var(--ink-50);
    border: 1px solid var(--border-1);
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
  }
  .meaning h3 {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 18px; color: var(--ink-900);
    margin: 0 0 12px 0; letter-spacing: -0.01em;
  }
  .meaning ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .meaning li {
    display: flex; gap: 10px;
    color: var(--fg-2); font-size: 13.5px; line-height: 1.5;
  }
  .meaning li .ck {
    width: 18px; height: 18px; border-radius: 999px;
    background: rgba(16,185,129,0.18); color: var(--success-700);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    margin-top: 1px;
  }
  .meaning li .ck svg { width: 10px; height: 10px; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: currentColor; }
  .meaning li strong { color: var(--ink-900); font-weight: 600; }
</style>
</head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
  /* ========================================================
     Verify flow — shared building blocks
     ======================================================== */

  function Lock({ size = 12 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.75" fill="none" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="11" width="16" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    );

                  </div>
                </div>
              </div>

              <a href="#" className="btn btn-primary" style={{width:'100%', justifyContent:'center', marginTop:14}}>Download original PDF</a>
              <a href="#" className="btn btn-secondary" style={{width:'100%', justifyContent:'center', marginTop:8}}>See full audit trail</a>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ========================================================
     Canvas
     ======================================================== */

  function App() {
    return (
      <DesignCanvas title="Verify flow · the public page after a QR scan">
        <DCSection id="states" title="States — the three possible outcomes when someone visits a /verify URL">
          <DCArtboard id="valid" label="01 · Valid (default state)" width={1100} height={1180}>
            <VerifyValid/>
          </DCArtboard>
          <DCArtboard id="detail" label="02 · Audit trail expanded" width={1100} height={1340}>
            <VerifyDetail/>
          </DCArtboard>
          <DCArtboard id="failed" label="03 · Hash mismatch (file altered)" width={1100} height={1180}>
            <VerifyFailed/>
          </DCArtboard>
        </DCSection>
        <DCSection id="mobile" title="Mobile — what users see after scanning the QR code on a printed audit trail">
          <DCArtboard id="mobile-scan" label="04 · Mobile (just scanned)" width={520} height={780}>
            <VerifyMobile/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
